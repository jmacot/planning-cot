<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hospital COT — Vista Pixel Art</title>
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="apple-touch-icon" href="icon.svg">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Hospital COT">
  <meta name="theme-color" id="meta-theme" content="#1a3a5c">
  <meta name="description" content="Visualizacion pixel art del hospital COT con cirujanos animados" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lora:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #e5eaf2; --surface: #ffffff; --surface2: #dbe2ec;
      --border: #e2e8f0; --border-light: #e5e7eb;
      --accent: #1a3a5c; --accent-light: #eef2f7; --accent-hover: #14304f;
      --text: #222222; --text-muted: #555555; --text-light: #888888;
      --green: #16a34a; --green-light: #dcfce7;
      --amber: #c0540a; --amber-light: #fef3c7;
      --red: #dc2626; --red-light: #fee2e2;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.08);
      --shadow-hover: 0 20px 25px -5px rgb(0 0 0 / 0.1);
      --radius-sm: 8px; --radius: 16px; --radius-lg: 24px;
    }
    [data-theme="dark"] {
      --bg: #111827; --surface: #1f2937; --surface2: #283244;
      --border: #374151; --border-light: #4b5563;
      --text: #f1f5f9; --text-muted: #a8b8cc; --text-light: #64748b;
      --accent: #93c5fd; --accent-hover: #bae0ff; --accent-light: #1e3a5f;
      --green: #4ade80; --green-light: #14352a;
      --amber: #fbbf24; --amber-light: #3b2a10;
      --red: #f87171; --red-light: #3b1010;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.15);
      --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.2);
      --shadow-hover: 0 20px 25px -5px rgb(0 0 0 / 0.3);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', Arial, sans-serif; background: var(--bg);
      color: var(--text); min-height: 100vh; padding: 30px 20px;
      -webkit-tap-highlight-color: transparent;
    }
    .app-container { max-width: 1100px; margin: 0 auto; }
    .back-home {
      position: fixed; top: 10px; left: 10px;
      display: inline-flex; align-items: center; gap: 4px;
      font-family: 'SF Mono', 'Consolas', monospace; font-size: 11px; letter-spacing: 0.05em;
      color: var(--text-muted); text-decoration: none;
      padding: 6px 12px; border-radius: 999px;
      border: 1.5px solid var(--border); background: var(--surface);
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      transition: border-color 0.2s, color 0.2s; z-index: 100;
    }
    .back-home:hover { border-color: var(--accent); color: var(--accent); }
    .app-header {
      text-align: center; margin-bottom: 20px; position: relative;
      background: linear-gradient(135deg, #0f2240 0%, #1a3a5c 50%, #234e77 100%);
      color: white; padding: 40px 32px 32px;
      border-radius: var(--radius-lg); overflow: hidden;
      box-shadow: 0 8px 32px rgba(15,34,64,0.25);
      animation: fadeInUp 0.6s ease-out;
    }
    .app-header::before {
      content: ''; position: absolute; top: -80px; right: -30px;
      width: 250px; height: 250px; border-radius: 50%;
      background: radial-gradient(circle, rgba(14,165,233,0.12) 0%, transparent 70%);
      filter: blur(40px);
    }
    .app-header::after {
      content: ''; position: absolute; bottom: -60px; left: 15%;
      width: 200px; height: 200px; border-radius: 50%;
      background: radial-gradient(circle, rgba(139,92,246,0.08) 0%, transparent 70%);
      filter: blur(40px);
    }
    .app-header h1 {
      font-family: 'Lora', serif; color: white; position: relative;
      font-size: clamp(1.3rem, 3vw, 1.7rem); font-weight: 700;
    }
    .app-header p { font-size: 13px; color: rgba(255,255,255,0.6); margin-top: 4px; position: relative; }
    [data-theme="dark"] .app-header {
      background: linear-gradient(135deg, #152238 0%, #1c2f4a 50%, #213656 100%);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
    }
    .theme-toggle {
      position: absolute; top: 12px; right: 12px;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2);
      border-radius: 50%; width: 40px; height: 40px; font-size: 1.2rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: border-color 0.2s, background 0.2s; z-index: 1; color: white;
    }
    .theme-toggle:hover { border-color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.12); }

    .hospital-layout {
      display: grid; grid-template-columns: 220px 1fr; gap: 16px;
      animation: fadeInUp 0.6s ease-out 0.1s both;
    }
    .sidebar { display: flex; flex-direction: column; gap: 12px; }
    .sidebar-card {
      background: var(--surface); border: 1px solid var(--border-light);
      border-radius: var(--radius); padding: 14px; box-shadow: var(--shadow-sm);
    }
    .sidebar-card h3 {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 8px;
    }

    .mini-cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .mini-cal-nav span { font-size: 13px; font-weight: 700; color: var(--text); }
    .mini-cal-nav button {
      background: none; border: 1px solid var(--border); border-radius: 6px;
      width: 28px; height: 28px; cursor: pointer; font-size: 14px;
      color: var(--text-muted); display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .mini-cal-nav button:hover { border-color: var(--accent); color: var(--accent); }
    .mini-cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; text-align: center; }
    .mini-cal-hdr { font-size: 9px; font-weight: 700; color: var(--text-light); text-transform: uppercase; padding: 2px 0; }
    .mini-cal-day {
      font-size: 11px; padding: 4px 0; border-radius: 6px; cursor: pointer;
      transition: all 0.15s; color: var(--text); border: 1.5px solid transparent; font-weight: 500;
    }
    .mini-cal-day:hover { background: var(--accent-light); }
    .mini-cal-day.selected { background: var(--accent); color: white; font-weight: 700; box-shadow: 0 2px 8px rgba(26,58,92,0.25); }
    [data-theme="dark"] .mini-cal-day.selected { background: #3b82f6; }
    .mini-cal-day.empty { visibility: hidden; }
    .mini-cal-day.no-data { color: var(--text-light); opacity: 0.4; cursor: default; }
    .mini-cal-day.today { border-color: var(--amber); }
    .mini-cal-day.weekend { color: var(--red); }

    .day-info { font-size: 12px; line-height: 1.6; }
    .day-info .day-title { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
    .day-info .day-count { font-size: 22px; font-weight: 700; color: var(--accent); }
    .day-info .day-label { color: var(--text-muted); }
    .floor-counts { margin-top: 8px; }
    .floor-count-row { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; font-size: 11px; color: var(--text-muted); }
    .floor-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

    .shift-toggle {
      display: flex; border-radius: 10px; overflow: hidden;
      border: 1.5px solid var(--border); background: var(--surface2);
    }
    .shift-btn {
      flex: 1; padding: 8px 0; border: none; background: none;
      font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 600;
      color: var(--text-muted); cursor: pointer; transition: all 0.25s;
      display: flex; align-items: center; justify-content: center; gap: 4px;
    }
    .shift-btn.active {
      background: var(--accent); color: white;
      box-shadow: 0 2px 8px rgba(26,58,92,0.3);
    }
    .shift-btn svg { width: 14px; height: 14px; }

    .zone-nav { display: flex; flex-direction: column; gap: 6px; }
    .zone-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px; border-radius: 10px;
      border: 1.5px solid var(--border); background: var(--surface);
      font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 600;
      color: var(--text); cursor: pointer; transition: all 0.2s;
    }
    .zone-btn:hover { border-color: var(--accent); background: var(--accent-light); }
    .zone-btn.active { border-color: var(--accent); background: var(--accent); color: white; }
    .zone-btn .zdot { width: 8px; height: 8px; border-radius: 3px; flex-shrink: 0; }
    .zone-btn .zcount {
      margin-left: auto; background: var(--surface2); color: var(--text-muted);
      font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 999px;
    }
    .zone-btn.active .zcount { background: rgba(255,255,255,0.2); color: white; }

    .canvas-wrap {
      background: var(--surface); border: 1px solid var(--border-light);
      border-radius: var(--radius) var(--radius) 0 0; box-shadow: var(--shadow);
      overflow: hidden; position: relative;
    }
    .canvas-wrap canvas {
      display: block; width: 100%; height: auto;
      image-rendering: pixelated; image-rendering: crisp-edges;
    }
    .zone-back-btn {
      position: absolute; top: 12px; left: 12px;
      padding: 7px 16px; border-radius: 999px;
      border: 1.5px solid rgba(255,255,255,0.5); background: rgba(0,0,0,0.5);
      color: white; font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 700;
      cursor: pointer; z-index: 10; transition: all 0.2s; backdrop-filter: blur(4px);
    }
    .zone-back-btn:hover { background: rgba(0,0,0,0.7); border-color: white; }
    .zone-label-el {
      position: absolute; top: 12px; right: 12px;
      padding: 5px 14px; border-radius: 999px;
      background: rgba(0,0,0,0.5); color: white; backdrop-filter: blur(4px);
      font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 700;
      letter-spacing: 0.5px; text-transform: uppercase; z-index: 10;
    }

    .legend {
      display: flex; flex-wrap: wrap; gap: 8px; padding: 12px 16px;
      border: 1px solid var(--border-light); border-top: none;
      background: var(--surface); border-radius: 0 0 var(--radius) var(--radius);
    }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 10px; font-weight: 600; color: var(--text-muted); }
    .legend-dot { width: 10px; height: 10px; border-radius: 3px; }

    .pixel-tooltip {
      position: fixed; pointer-events: none;
      background: var(--surface); color: var(--text);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 8px 12px; font-size: 11px; font-family: 'Inter', sans-serif;
      box-shadow: var(--shadow); z-index: 9999;
      opacity: 0; transition: opacity 0.15s; max-width: 220px; line-height: 1.5;
    }
    .pixel-tooltip.visible { opacity: 1; }
    .pixel-tooltip .tt-name { font-weight: 700; font-size: 12px; }
    .pixel-tooltip .tt-unit { color: var(--text-muted); font-size: 10px; }
    .pixel-tooltip .tt-act { margin-top: 3px; }
    .pixel-tooltip .tt-comp { font-size: 10px; color: var(--text-light); margin-top: 2px; }

    .no-data-msg { text-align: center; padding: 80px 32px; animation: fadeInUp 0.6s ease-out 0.1s both; }
    .no-data-msg h2 { font-family: 'Lora', serif; font-size: 1.3rem; margin-bottom: 12px; }
    .no-data-msg p { color: var(--text-muted); font-size: 14px; margin-bottom: 20px; }
    .no-data-msg a {
      display: inline-block; background: var(--accent); color: white;
      padding: 10px 24px; border-radius: 8px; text-decoration: none;
      font-weight: 600; font-size: 13px; transition: all 0.2s;
    }
    .no-data-msg a:hover { background: var(--accent-hover); transform: translateY(-1px); }

    .app-footer { text-align: center; padding: 16px 0 8px; }
    .app-footer span { font-size: 0.7rem; color: var(--text-light); }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @media (max-width: 700px) {
      .hospital-layout { grid-template-columns: 1fr; }
      .sidebar { flex-direction: row; flex-wrap: wrap; }
      .sidebar-card { flex: 1; min-width: 140px; }
      .back-home { padding: 4px 8px; font-size: 10px; top: 6px; left: 6px; }
      .app-header { padding: 32px 20px 24px; border-radius: var(--radius); }
      .app-header::before, .app-header::after { display: none; }
      .theme-toggle { width: 36px; height: 36px; font-size: 1.1rem; top: 8px; right: 8px; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }
  </style>
</head>
<body>
<div class="app-container">
  <a class="back-home" href="index.html" title="Volver a Planning">&#8592; Planning</a>
  <div class="app-header">
    <button class="theme-toggle" id="btn-theme" title="Cambiar tema" aria-label="Cambiar a modo oscuro"></button>
    <h1>Hospital COT</h1>
    <p>Vista Pixel Art &mdash; Actividad diaria de cirujanos</p>
  </div>

  <div id="no-data" class="no-data-msg" style="display:none">
    <h2>Sin datos cargados</h2>
    <p>Primero carga el Excel de planificacion en la pagina principal.</p>
    <a href="index.html">Ir a Planning COT</a>
  </div>

  <div id="main-content" style="display:none">
    <div class="hospital-layout">
      <div class="sidebar">
        <div class="sidebar-card">
          <h3>Calendario</h3>
          <div class="mini-cal-nav">
            <button id="cal-prev" title="Mes anterior">&#9664;</button>
            <span id="cal-month-label"></span>
            <button id="cal-next" title="Mes siguiente">&#9654;</button>
          </div>
          <div class="mini-cal-grid" id="mini-cal"></div>
        </div>
        <div class="sidebar-card">
          <h3>Dia seleccionado</h3>
          <div class="day-info">
            <div class="day-title" id="day-title">&mdash;</div>
            <div><span class="day-count" id="day-count">0</span> <span class="day-label">cirujanos</span></div>
            <div class="floor-counts" id="floor-counts"></div>
          </div>
        </div>
        <div class="sidebar-card">
          <h3>Turno</h3>
          <div class="shift-toggle">
            <button class="shift-btn active" data-shift="M" id="btn-shift-m">
              <svg viewBox="0 0 20 20" fill="currentColor"><circle cx="10" cy="10" r="4"/><path d="M10 2v2m0 12v2m8-8h-2M4 10H2m13.07-5.07l-1.42 1.42M6.34 13.66l-1.42 1.42m11.31 0l-1.42-1.42M6.34 6.34L4.93 4.93" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
              Manana
            </button>
            <button class="shift-btn" data-shift="T" id="btn-shift-t">
              <svg viewBox="0 0 20 20" fill="currentColor"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.002 8.002 0 1010.586 10.586z"/></svg>
              Tarde
            </button>
          </div>
        </div>
        <div class="sidebar-card">
          <h3>Zonas</h3>
          <div class="zone-nav" id="zone-nav">
            <button class="zone-btn" data-zone="quirofanos">
              <span class="zdot" style="background:#1a3a5c"></span>Quirofanos<span class="zcount" id="count-quirofanos">0</span>
            </button>
            <button class="zone-btn" data-zone="consultas">
              <span class="zdot" style="background:#16a34a"></span>Consultas<span class="zcount" id="count-consultas">0</span>
            </button>
            <button class="zone-btn" data-zone="urgencias">
              <span class="zdot" style="background:#dc2626"></span>Urgencias<span class="zcount" id="count-urgencias">0</span>
            </button>
            <button class="zone-btn" data-zone="planta">
              <span class="zdot" style="background:#64748b"></span>Planta<span class="zcount" id="count-planta">0</span>
            </button>
          </div>
        </div>
        <div class="sidebar-card" id="selected-panel" style="display:none">
          <h3>Cirujano seleccionado</h3>
          <div id="selected-info" style="font-size:12px;line-height:1.8"></div>
        </div>
      </div>
      <div>
        <div class="canvas-wrap">
          <canvas id="hospital-canvas" width="960" height="886"></canvas>
          <button id="btn-back" class="zone-back-btn" style="display:none">&#8592; Volver</button>
          <div id="zone-label" class="zone-label-el" style="display:none"></div>
        </div>
        <div class="legend" id="legend"></div>
      </div>
    </div>
  </div>
  <div class="app-footer"><span>COT &mdash; Hospital Pixel Art v4.0</span></div>
</div>
<div class="pixel-tooltip" id="tooltip"></div>

<script>
// ─────────────────────────────────────────────
//  THEME
// ─────────────────────────────────────────────
var btnTheme = document.getElementById('btn-theme');
function applyTheme(dark) {
  var mt = document.getElementById('meta-theme');
  if (dark) {
    document.documentElement.setAttribute('data-theme', 'dark');
    btnTheme.textContent = '\u2600\uFE0F';
    btnTheme.setAttribute('aria-label', 'Cambiar a modo claro');
    if (mt) mt.setAttribute('content', '#0a1628');
  } else {
    document.documentElement.removeAttribute('data-theme');
    btnTheme.textContent = '\uD83C\uDF19';
    btnTheme.setAttribute('aria-label', 'Cambiar a modo oscuro');
    if (mt) mt.setAttribute('content', '#1a3a5c');
  }
}
function getAutoTheme() {
  var h = new Date().getHours();
  return (h >= 21 || h < 7 || window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
}
function initTheme() {
  var saved = localStorage.getItem('planning-theme');
  var savedDate = localStorage.getItem('planning-theme-date');
  var today = new Date().toDateString();
  if (saved && savedDate === today) applyTheme(saved === 'dark');
  else { localStorage.removeItem('planning-theme'); applyTheme(getAutoTheme() === 'dark'); }
}
btnTheme.addEventListener('click', function() {
  var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  applyTheme(!isDark);
  localStorage.setItem('planning-theme', isDark ? 'dark' : 'light');
  localStorage.setItem('planning-theme-date', new Date().toDateString());
});

// ─────────────────────────────────────────────
//  DATA LOADING
// ─────────────────────────────────────────────
var parsedData, SURGEONS, SURGEON_UNITS, availableMonths, allDates;
var currentMonth, currentYear, selectedDay;

function loadData() {
  var raw = localStorage.getItem('planning-parsedData');
  if (!raw) return false;
  try {
    parsedData = JSON.parse(raw);
    SURGEONS = JSON.parse(localStorage.getItem('planning-surgeons'));
    SURGEON_UNITS = JSON.parse(localStorage.getItem('planning-units'));
    availableMonths = JSON.parse(localStorage.getItem('planning-months'));
    allDates = JSON.parse(localStorage.getItem('planning-dates'));
    return !!(parsedData && SURGEONS);
  } catch (e) { return false; }
}

// ─────────────────────────────────────────────
//  CONSTANTS
// ─────────────────────────────────────────────
var MONTH_NAMES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
var DAY_NAMES_SHORT = ['L','M','X','J','V','S','D'];
var DAY_NAMES_FULL = ['Lunes','Martes','Miercoles','Jueves','Viernes','Sabado','Domingo'];

var ACTIVITY_LABELS = {
  qui_m: 'Quirofano M', qui_t: 'Quirofano T',
  cons_m: 'Consulta M', cons_t: 'Consulta T',
  diferida: 'Diferida/Planta', diferida_t: 'Diferida T',
  rucot: 'RUCOT', gestion: 'Gestion',
  guardia: 'Guardia', saliente: 'Saliente', localizado: 'Localizado'
};
var ACTIVITY_COLORS = {
  qui_m: '#1a3a5c', qui_t: '#2563eb',
  cons_m: '#16a34a', cons_t: '#0d9488',
  diferida: '#64748b', diferida_t: '#64748b',
  rucot: '#e11d48', gestion: '#ca8a04',
  guardia: '#dc2626', saliente: '#f59e0b', localizado: '#7c3aed'
};
var ACTIVITY_ZONE = {
  qui_m: 'quirofanos', qui_t: 'quirofanos',
  cons_m: 'consultas', cons_t: 'consultas',
  rucot: 'consultas', gestion: 'consultas',
  diferida: 'planta', diferida_t: 'planta',
  guardia: 'urgencias', saliente: 'urgencias', localizado: 'urgencias'
};
var FLOOR_MAP = {
  qui_m: 2, qui_t: 2,
  cons_m: 1, cons_t: 1, diferida: 1, diferida_t: 1, rucot: 1, gestion: 1,
  guardia: 0, saliente: 0, localizado: 0
};
var FLOOR_COLORS = ['#dc2626','#16a34a','#1a3a5c'];
var FLOOR_NAMES = ['Urgencias','Consultas','Quirofanos'];
var BUBBLE_TEXTS = {
  qui_m:'Operando...', qui_t:'Operando...',
  cons_m:'En consulta', cons_t:'En consulta',
  diferida:'Planta', diferida_t:'Planta',
  rucot:'RUCOT', gestion:'Gestion',
  guardia:'De guardia', saliente:'Saliente', localizado:'Localizado'
};

// ─────────────────────────────────────────────
//  CANVAS
// ─────────────────────────────────────────────
var CW = 960, CH = 886;
var canvas = document.getElementById('hospital-canvas');
var ctx = canvas.getContext('2d');
var tooltipEl = document.getElementById('tooltip');

// ─────────────────────────────────────────────
//  IMAGE LOADING
// ─────────────────────────────────────────────
function loadImg(src) { var img = new Image(); img.src = src; return img; }

var bgImage = loadImg('hospital-bg.png');
var bodyImg = loadImg('assets/characters/body.png');

// ─────────────────────────────────────────────
//  M/T FILTER
// ─────────────────────────────────────────────
function isActivityVisible(activity, shift) {
  if (activity.endsWith('_m')) return shift === 'M';
  if (activity.endsWith('_t')) return shift === 'T';
  return true;
}

// ─────────────────────────────────────────────
//  GET DAY DATA
// ─────────────────────────────────────────────
function getDayActivities(day, month, year) {
  var result = [];
  if (!parsedData) return result;
  for (var sid in parsedData) {
    var entries = parsedData[sid];
    for (var i = 0; i < entries.length; i++) {
      var e = entries[i];
      if (e.day === day && e.month === month && e.year === year) {
        if (e.activity === 'diferida') {
          var hasGuardia = entries.some(function(e2) {
            return e2.day === day && e2.month === month && e2.year === year && e2.activity === 'guardia';
          });
          if (hasGuardia) continue;
        }
        result.push({surgeonId:Number(sid), activity:e.activity, companions:e.companions||[]});
      }
    }
  }
  return result;
}

function surgeonHue(id) { return (id * 137 + 30) % 360; }

function createZoneSprite(a, zone, slotIdx) {
  var zd = ZONE_DATA[zone];
  var slot = zd.slots[slotIdx % zd.slots.length];
  var ox = (Math.random()-0.5)*16, oy = (Math.random()-0.5)*8;

  // Pick a random entry path
  var pathIdx = Math.floor(Math.random() * zd.paths.length);
  var path = zd.paths[pathIdx];
  var startPt = path[0];

  return {
    id:a.surgeonId, name:SURGEONS[a.surgeonId]||'Cirujano '+a.surgeonId,
    zone:zone, activity:a.activity, companions:a.companions,
    unit:SURGEON_UNITS?SURGEON_UNITS[a.surgeonId]:null,
    hue:surgeonHue(a.surgeonId),
    skinRow:a.surgeonId%6, hairRow:(a.surgeonId*3+1)%8,
    x:startPt.x, y:startPt.y,
    homeX:slot.x+ox, homeY:slot.y+oy,
    targetX:path[1]?path[1].x:slot.x+ox,
    targetY:path[1]?path[1].y:slot.y+oy,
    direction:0, animStep:0, frameTimer:0,
    state:'entering',           // entering → walk → idle
    entryPath:path,             // waypoints to follow
    entryStep:1,                // current waypoint index (0 = start pos)
    wanderTimer:5000+Math.random()*5000, isWandering:false,
    bubbleTimer:5000+Math.random()*8000, bubbleVisible:false, bubbleAlpha:0
  };
}

  };

function buildSprites(activities) {
  // Filter visible activities once — same list feeds both views
  var visible = [];
  for (var i = 0; i < activities.length; i++) {
    if (isActivityVisible(activities[i].activity, timeShift)) visible.push(activities[i]);
  }

  // General view sprites by floor
  var floors = [[],[],[]];
  for (var i = 0; i < visible.length; i++) {
    var f = FLOOR_MAP[visible[i].activity];
    if (f !== undefined) floors[f].push(visible[i]);
  }
  generalSprites = [];
  for (var fi = 0; fi < 3; fi++) {
    for (var j = 0; j < floors[fi].length; j++) {
      generalSprites.push(createGeneralSprite(floors[fi][j], fi, j));
    }
  }

  // Zone sprites — same visible list, same surgeon IDs
  var groups = {quirofanos:[],consultas:[],urgencias:[],planta:[]};
  for (var i = 0; i < visible.length; i++) {
    var z = ACTIVITY_ZONE[visible[i].activity];
    if (z) groups[z].push(visible[i]);
  }
  zoneSprites = [];
  for (var z in groups) {
    for (var j = 0; j < groups[z].length; j++) zoneSprites.push(createZoneSprite(groups[z][j], z, j));
  }

  updateZoneCounts(activities);
}

function updateZoneCounts(activities) {
  var c = {quirofanos:0,consultas:0,urgencias:0,planta:0};
  for (var i = 0; i < activities.length; i++) {
    var z = ACTIVITY_ZONE[activities[i].activity];
    if (z && isActivityVisible(activities[i].activity, timeShift)) c[z]++;
  }
  for (var z in c) {
    var el = document.getElementById('count-'+z);
    if (el) el.textContent = c[z];
  }
}

function drawSurgeon(x, y, hue, frame, state, facing) {
  var s = PX;
  var skin='#FFDAB9',skinShadow='#E8967A',coat='#ffffff',coatShadow='#e2e8f0';
  var capColor='hsl('+hue+',60%,38%)', scrubColor='hsl('+hue+',65%,45%)';
  var shoes='#444',pants='#4b5563',f=facing;
  var legOff=(state==='walk')?Math.sin(frame*Math.PI*0.5)*1.5*s:0;
  var armAnim=(state==='work')?Math.sin(frame*Math.PI*0.5)*s:0;
  var breathe=(state==='idle')?Math.sin(frame*0.8)*0.3*s:0;

  ctx.fillStyle='rgba(0,0,0,0.18)';
  ctx.beginPath();ctx.ellipse(x,y+11.5*s,5*s,1.5*s,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=shoes;
  ctx.fillRect(x-3*s,y+10*s+legOff,3*s,s);ctx.fillRect(x+1*s,y+10*s-legOff,3*s,s);
  ctx.fillStyle=pants;
  ctx.fillRect(x-2*s,y+8*s+legOff,2*s,2*s);ctx.fillRect(x+1*s,y+8*s-legOff,2*s,2*s);
  ctx.fillStyle=coat;ctx.fillRect(x-3*s,y+2*s+breathe,8*s,6*s);
  ctx.fillStyle=coatShadow;ctx.fillRect(x+(f>0?4:-3)*s,y+3*s+breathe,s,4*s);
  ctx.fillStyle='#cbd5e1';ctx.fillRect(x+0.5*s,y+4*s+breathe,s,s);ctx.fillRect(x+0.5*s,y+6*s+breathe,s,s);
  ctx.fillStyle=scrubColor;ctx.fillRect(x-2*s,y+1.5*s+breathe,6*s,2*s);
  ctx.fillStyle=coat;
  ctx.fillRect(x-4*s,y+3*s+breathe+armAnim,2*s,4*s);ctx.fillRect(x+4*s,y+3*s+breathe-armAnim,2*s,4*s);
  ctx.fillStyle=skin;
  ctx.fillRect(x-4*s,y+7*s+breathe+armAnim,2*s,s);ctx.fillRect(x+4*s,y+7*s+breathe-armAnim,2*s,s);
  ctx.fillStyle=skin;ctx.fillRect(x-2*s,y-3*s,6*s,4*s);
  ctx.fillStyle=skinShadow;ctx.fillRect(x+(f>0?3:-2)*s,y-2*s,s,2*s);
  ctx.fillStyle=capColor;ctx.fillRect(x-1*s,y-5*s,4*s,s);ctx.fillRect(x-2*s,y-4*s,6*s,s);
  ctx.fillStyle='hsl('+hue+',50%,28%)';ctx.fillRect(x-2*s,y-3*s,6*s,s);
  ctx.fillStyle='#333';
  var blink=frame%10===0;
  if(!blink){var ex=f>0?0:-1;ctx.fillRect(x+ex*s,y-2*s,s,s);ctx.fillRect(x+(ex+3)*s,y-2*s,s,s);ctx.fillStyle='#fff';ctx.fillRect(x+(ex+(f>0?0:1))*s,y-2*s,0.5*s,0.5*s);}
  else{ctx.fillRect(x-s,y-1.5*s,4*s,0.5*s);}
  ctx.fillStyle='#E8967A';ctx.fillRect(x,y-0.5*s,2*s,0.5*s);
  ctx.fillStyle=scrubColor;ctx.globalAlpha=0.8;ctx.fillRect(x+2*s,y+3*s+breathe,2*s,2*s);ctx.globalAlpha=1;
}

// ─────────────────────────────────────────────
//  DRAW SPRITE-SHEET CHARACTER (zone view)
// ─────────────────────────────────────────────
function drawSpriteCharacter(sp, scale, offX, offY) {
  var step = WALK_CYCLE[sp.animStep % WALK_CYCLE.length];
  var col = sp.direction * 6 + step;
  var ss = scale * SPRITE_SCALE;
  var dw = SW*ss, dh = SH*ss;
  var feetX = offX + sp.x*scale;
  var feetY = offY + sp.y*scale;
  var dx = feetX - dw/2;
  var dy = feetY - dh;

  // Shadow
  ctx.save();ctx.globalAlpha=0.25;ctx.fillStyle='#000';
  ctx.beginPath();ctx.ellipse(feetX, feetY+2, 8*ss, 3*ss, 0,0,Math.PI*2);ctx.fill();
  ctx.restore();

  if (bodyImg.complete) ctx.drawImage(bodyImg, col*SW, sp.skinRow*SH, SW, SH, dx, dy, dw, dh);
  var outfit = outfitImgs[sp.zone];
  if (outfit && outfit.complete) ctx.drawImage(outfit, col*SW, 0, SW, SH, dx, dy, dw, dh);
  if (hairImg.complete) ctx.drawImage(hairImg, col*SW, sp.hairRow*SH, SW, SH, dx, dy, dw, dh);
}

// Check if a point is inside any walkable rect of a zone
function isWalkable(zone, px, py) {
  var rects = ZONE_DATA[zone].walkable;
  if (!rects) return true;
  for (var i = 0; i < rects.length; i++) {
    var r = rects[i];
    if (px >= r.x && px <= r.x+r.w && py >= r.y && py <= r.y+r.h) return true;
  }
  return false;
}

// Pick a random walkable point in a zone
function randomWalkablePoint(zone) {
  var rects = ZONE_DATA[zone].walkable;
  if (!rects || rects.length === 0) return {x:200,y:200};
  var r = rects[Math.floor(Math.random() * rects.length)];
  return {
    x: r.x + 10 + Math.random() * (r.w - 20),
    y: r.y + 10 + Math.random() * (r.h - 20)
  };
}

function drawNameTag(x, y, name, yOff) {
  var lastName = name.split(' ').pop();
  ctx.font = 'bold 10px Inter, sans-serif'; ctx.textAlign = 'center';
  var tw = ctx.measureText(lastName).width;
  var tagY = y - yOff, rx = x-tw/2-6, ry = tagY-11, rw = tw+12, rh = 15;
  ctx.beginPath();
  ctx.moveTo(rx+4,ry);ctx.lineTo(rx+rw-4,ry);ctx.quadraticCurveTo(rx+rw,ry,rx+rw,ry+4);
  ctx.lineTo(rx+rw,ry+rh-4);ctx.quadraticCurveTo(rx+rw,ry+rh,rx+rw-4,ry+rh);
  ctx.lineTo(rx+4,ry+rh);ctx.quadraticCurveTo(rx,ry+rh,rx,ry+rh-4);
  ctx.lineTo(rx,ry+4);ctx.quadraticCurveTo(rx,ry,rx+4,ry);ctx.closePath();
  ctx.fillStyle='rgba(255,255,255,0.92)';ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,0.15)';ctx.lineWidth=1;ctx.stroke();
  ctx.fillStyle='#1e293b';ctx.fillText(lastName,x,tagY);
}

function drawBubble(x, y, text, alpha) {
  if (alpha<=0) return;
  ctx.save();ctx.globalAlpha=alpha;
  ctx.font='10px Inter, sans-serif';
  var tw=ctx.measureText(text).width, bw=tw+16, bh=20, bx=x-bw/2, by=y;
  ctx.fillStyle='rgba(255,255,255,0.95)';
  ctx.beginPath();ctx.moveTo(bx+6,by);ctx.lineTo(bx+bw-6,by);ctx.quadraticCurveTo(bx+bw,by,bx+bw,by+6);
  ctx.lineTo(bx+bw,by+bh-6);ctx.quadraticCurveTo(bx+bw,by+bh,bx+bw-6,by+bh);
  ctx.lineTo(bx+6,by+bh);ctx.quadraticCurveTo(bx,by+bh,bx,by+bh-6);
  ctx.lineTo(bx,by+6);ctx.quadraticCurveTo(bx,by,bx+6,by);ctx.closePath();
  ctx.fill();ctx.strokeStyle='rgba(0,0,0,0.12)';ctx.lineWidth=1;ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,0.95)';
  ctx.beginPath();ctx.moveTo(x-4,by+bh);ctx.lineTo(x,by+bh+6);ctx.lineTo(x+4,by+bh);ctx.closePath();ctx.fill();
  ctx.fillStyle='#1e293b';ctx.textAlign='center';ctx.fillText(text,x,by+14);
  ctx.restore();
}

function drawGlow(x, y, hue, intensity, rx, ry) {
  ctx.save();ctx.globalAlpha=intensity*0.4;
  ctx.fillStyle='hsl('+hue+',80%,60%)';
  ctx.beginPath();ctx.ellipse(x,y+(ry||2*PX),rx||10*PX,ry||14*PX,0,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

// Draw sprite-sheet character at direct canvas coordinates (for general view)
var GENERAL_SPRITE_SCALE = 2.2; // scale for general hospital view
function drawSpriteGeneral(sp) {
  var step = WALK_CYCLE[sp.animStep % WALK_CYCLE.length];
  var dir = sp.direction;
  var col = dir * 6 + step;
  var sc = GENERAL_SPRITE_SCALE;
  var dw = SW*sc, dh = SH*sc;
  var dx = sp.x - dw/2, dy = sp.y - dh + 8;

  // Shadow
  ctx.save();ctx.globalAlpha=0.2;ctx.fillStyle='#000';
  ctx.beginPath();ctx.ellipse(sp.x, sp.y+8, 10*sc, 3*sc, 0,0,Math.PI*2);ctx.fill();
  ctx.restore();

  if (bodyImg.complete) ctx.drawImage(bodyImg, col*SW, sp.skinRow*SH, SW, SH, dx, dy, dw, dh);
  var outfit = outfitImgs[sp.zone];
  if (outfit && outfit.complete) ctx.drawImage(outfit, col*SW, 0, SW, SH, dx, dy, dw, dh);
  if (hairImg.complete) ctx.drawImage(hairImg, col*SW, sp.hairRow*SH, SW, SH, dx, dy, dw, dh);
}

// ─────────────────────────────────────────────
//  EASING
// ─────────────────────────────────────────────
function easeInOut(t) { return t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2; }

// ─────────────────────────────────────────────
//  RENDER GENERAL VIEW
// ─────────────────────────────────────────────
function renderGeneral(zoomProgress) {
  var p = zoomProgress||0, ep = easeInOut(p);
  var vx=0,vy=0,vw=CW,vh=CH;
  if (p>0 && currentZone) {
    var r=ZONE_DATA[currentZone].region;
    vx=r.x*ep; vy=r.y*ep; vw=CW-(CW-r.w)*ep; vh=CH-(CH-r.h)*ep;
  }
  if (bgImage.complete) {
    var sx=vx*(2150/CW),sy=vy*(1984/CH),sw=vw*(2150/CW),sh=vh*(1984/CH);
    ctx.imageSmoothingEnabled=false;
    ctx.drawImage(bgImage,sx,sy,sw,sh,0,0,CW,CH);
  } else { ctx.fillStyle='#87ceeb';ctx.fillRect(0,0,CW,CH); }

  if (document.documentElement.getAttribute('data-theme')==='dark') {
    ctx.fillStyle='rgba(10,15,30,0.55)';ctx.fillRect(0,0,CW,CH);
  }

  if (p===0 && hoveredZone && ZONE_DATA[hoveredZone]) {
    var hr=ZONE_DATA[hoveredZone].region;
    ctx.fillStyle='rgba(255,255,255,0.12)';ctx.fillRect(hr.x,hr.y,hr.w,hr.h);
    ctx.strokeStyle='rgba(255,255,255,0.4)';ctx.lineWidth=2;ctx.strokeRect(hr.x,hr.y,hr.w,hr.h);
    ctx.font='bold 14px Inter, sans-serif';ctx.textAlign='center';
    ctx.fillStyle='rgba(255,255,255,0.9)';
    ctx.fillText('Entrar a '+ZONE_DATA[hoveredZone].label, hr.x+hr.w/2, hr.y+hr.h/2+5);
  }

  if (p<0.6) {
    ctx.globalAlpha=1-p*1.6;
    for (var i=0;i<generalSprites.length;i++) {
      var sp=generalSprites[i];
      var gs=GENERAL_SPRITE_SCALE;
      if (sp===selectedSprite) drawGlow(sp.x,sp.y,sp.hue,0.8,12*gs,4*gs);
      else if (sp===hoveredSprite) drawGlow(sp.x,sp.y,sp.hue,0.4,12*gs,4*gs);
      drawSpriteGeneral(sp);
      drawNameTag(sp.x, sp.y-SH*gs+4, sp.name, 0);
      if (sp.bubbleVisible && sp.bubbleAlpha>0) drawBubble(sp.x, sp.y-SH*gs-16, BUBBLE_TEXTS[sp.activity]||'', sp.bubbleAlpha);
    }
    ctx.globalAlpha=1;
  }
}

// ─────────────────────────────────────────────
//  RENDER ZONE VIEW
// ─────────────────────────────────────────────
function getZoneTransform(zoneName) {
  var zd=ZONE_DATA[zoneName];
  var scX=CW/zd.gifW, scY=CH/zd.gifH, sc=Math.min(scX,scY);
  return {scale:sc, offX:(CW-zd.gifW*sc)/2, offY:(CH-zd.gifH*sc)/2};
}

function renderZone(alpha) {
  if (!currentZone) return;
  var gif=zoneGifs[currentZone], t=getZoneTransform(currentZone);
  ctx.save(); ctx.globalAlpha=alpha;

  var isDark = document.documentElement.getAttribute('data-theme')==='dark';
  ctx.fillStyle=isDark?'#0a0f1a':'#c8cdd6'; ctx.fillRect(0,0,CW,CH);
  if (gif&&gif.complete) {
    ctx.imageSmoothingEnabled=false;
    ctx.drawImage(gif, t.offX, t.offY, ZONE_DATA[currentZone].gifW*t.scale, ZONE_DATA[currentZone].gifH*t.scale);
  }
  if (isDark) { ctx.fillStyle='rgba(10,15,30,0.4)';ctx.fillRect(0,0,CW,CH); }

  var zoneSps=zoneSprites.filter(function(s){return s.zone===currentZone;});
  zoneSps.sort(function(a,b){return a.y-b.y;});

  var ss=t.scale*SPRITE_SCALE;
  for (var i=0;i<zoneSps.length;i++) {
    var sp=zoneSps[i];
    var sx=t.offX+sp.x*t.scale, sy=t.offY+sp.y*t.scale;
    if (sp===selectedSprite) {
      ctx.save();ctx.globalAlpha=0.4;ctx.fillStyle='hsl('+sp.hue+',80%,60%)';
      ctx.beginPath();ctx.ellipse(sx,sy,14*ss,6*ss,0,0,Math.PI*2);ctx.fill();ctx.restore();
    } else if (sp===hoveredSprite) {
      ctx.save();ctx.globalAlpha=0.25;ctx.fillStyle='hsl('+sp.hue+',80%,60%)';
      ctx.beginPath();ctx.ellipse(sx,sy,14*ss,6*ss,0,0,Math.PI*2);ctx.fill();ctx.restore();
    }
    drawSpriteCharacter(sp,t.scale,t.offX,t.offY);
    drawNameTag(sx, sy-SH*ss-2, sp.name, 0);
    if (sp.bubbleVisible && sp.bubbleAlpha>0) drawBubble(sx, sy-SH*ss-22, BUBBLE_TEXTS[sp.activity]||'', sp.bubbleAlpha);
  }
  ctx.restore();
}

// ─────────────────────────────────────────────
//  MAIN RENDER
// ─────────────────────────────────────────────
function renderAll() {
  ctx.clearRect(0,0,CW,CH);
  if (viewMode==='general') { renderGeneral(0); }
  else if (viewMode==='transition-in') {
    renderGeneral(transitionProgress);
    if (transitionProgress>0.4) renderZone((transitionProgress-0.4)/0.6);
  }
  else if (viewMode==='zone') { renderZone(1); }
  else if (viewMode==='transition-out') {
    var p=1-transitionProgress;
    renderGeneral(p);
    if (p>0.4) renderZone((p-0.4)/0.6);
  }
}

// ─────────────────────────────────────────────
//  ZONE NAVIGATION
// ─────────────────────────────────────────────
function enterZone(zoneName) {
  if (viewMode!=='general'||!ZONE_DATA[zoneName]) return;
  currentZone=zoneName; viewMode='transition-in'; transitionProgress=0; transitionStart=performance.now();
  selectedSprite=null; hoveredSprite=null; updateSelectedPanel(null);
  document.getElementById('btn-back').style.display='';
  document.getElementById('zone-label').style.display='';
  document.getElementById('zone-label').textContent=ZONE_DATA[zoneName].label;
  var btns=document.querySelectorAll('.zone-btn');
  for(var i=0;i<btns.length;i++) btns[i].classList.toggle('active',btns[i].getAttribute('data-zone')===zoneName);
}

function exitZone() {
  if (viewMode!=='zone') return;
  viewMode='transition-out'; transitionProgress=0; transitionStart=performance.now();
  selectedSprite=null; hoveredSprite=null; updateSelectedPanel(null);
  document.getElementById('btn-back').style.display='none';
  document.getElementById('zone-label').style.display='none';
  var btns=document.querySelectorAll('.zone-btn');
  for(var i=0;i<btns.length;i++) btns[i].classList.remove('active');
}

for (var zi=0;zi<zoneBtns.length;zi++) {
  zoneBtns[zi].addEventListener('click', function() {
    var z=this.getAttribute('data-zone');
    if (viewMode==='zone' && currentZone===z) { exitZone(); return; }
    if (viewMode==='zone') { exitZone(); var target=z; setTimeout(function(){enterZone(target);}, TRANSITION_DURATION+50); return; }
    enterZone(z);
  });
}

// ─────────────────────────────────────────────
//  ANIMATION LOOP
// ─────────────────────────────────────────────
function gameLoop(timestamp) {
  var dt=timestamp-lastTime; lastTime=timestamp;
  if (dt>100) { requestAnimationFrame(gameLoop); return; }

  if (viewMode==='transition-in'||viewMode==='transition-out') {
    transitionProgress=Math.min(1,(timestamp-transitionStart)/TRANSITION_DURATION);
    if (transitionProgress>=1) {
      if (viewMode==='transition-in') viewMode='zone';
      else { viewMode='general'; currentZone=null; }
      transitionProgress=0;
    }
  }

  if (viewMode==='general'||viewMode==='transition-out') animateGeneralSprites(dt);
  if (viewMode==='zone'||viewMode==='transition-in') animateZoneSprites(dt);

  renderAll();
  requestAnimationFrame(gameLoop);
}

function animateBubble(sp, dt) {
  sp.bubbleTimer-=dt;
  if (sp.bubbleTimer<=0) {
    if (!sp.bubbleVisible) { sp.bubbleVisible=true;sp.bubbleAlpha=0;sp.bubbleTimer=3000+Math.random()*2000; }
    else { sp.bubbleVisible=false;sp.bubbleAlpha=0;sp.bubbleTimer=5000+Math.random()*10000; }
  }
  if (sp.bubbleVisible&&sp.bubbleAlpha<1) sp.bubbleAlpha=Math.min(1,sp.bubbleAlpha+dt/300);
  if (!sp.bubbleVisible&&sp.bubbleAlpha>0) sp.bubbleAlpha=Math.max(0,sp.bubbleAlpha-dt/200);
}

function animateGeneralSprites(dt) {
  for (var i=0;i<generalSprites.length;i++) {
    var sp=generalSprites[i]; sp.frameTimer+=dt;
    animateBubble(sp,dt);
    if (sp.state==='walk') {
      var speed=1.8, dx=sp.targetX-sp.x, dy=sp.targetY-sp.y, dist=Math.sqrt(dx*dx+dy*dy);
      if (dist<3) {
        sp.x=sp.targetX;sp.y=sp.targetY;
        sp.state='idle'; sp.direction=0; sp.animStep=0;
        if (sp.isWandering){sp.isWandering=false;sp.wanderTimer=4000+Math.random()*8000;}
        sp.frameTimer=0;
      } else {
        sp.x+=(dx/dist)*speed*(dt/16);sp.y+=(dy/dist)*speed*(dt/16);
        // Set sprite sheet direction based on movement
        sp.direction = Math.abs(dx)>Math.abs(dy) ? (dx>0?2:1) : (dy>0?0:3);
        if (sp.frameTimer>120){sp.animStep=(sp.animStep+1)%4;sp.frameTimer=0;}
      }
    } else {
      // Idle
      sp.animStep=0;
      sp.idleActionTimer-=dt;
      if (sp.idleActionTimer<=0&&sp.state==='idle') {
        // Random direction change
        sp.direction = Math.floor(Math.random()*4);
        sp.idleActionTimer=2000+Math.random()*4000;
      }
      sp.wanderTimer-=dt;
      if (sp.wanderTimer<=0&&!sp.isWandering&&sp.state!=='walk') {
        sp.isWandering=true;
        sp.targetX=sp.homeX+(20+Math.random()*40)*(Math.random()<0.5?-1:1);
        sp.targetY=sp.homeY;sp.state='walk';sp.frameTimer=0;
        sp.wanderTimer=1500+Math.random()*2000;
      }
      if (sp.isWandering&&sp.state!=='walk') {
        sp.wanderTimer-=dt;
        if (sp.wanderTimer<=0){sp.targetX=sp.homeX;sp.targetY=sp.homeY;sp.state='walk';sp.frameTimer=0;}
      }
    }
  }
}

function moveTowards(sp, dt, speed) {
  var dx=sp.targetX-sp.x, dy=sp.targetY-sp.y, dist=Math.sqrt(dx*dx+dy*dy);
  if (dist<3) { sp.x=sp.targetX; sp.y=sp.targetY; return true; }
  sp.x+=(dx/dist)*speed*(dt/16); sp.y+=(dy/dist)*speed*(dt/16);
  sp.direction=Math.abs(dx)>Math.abs(dy)?(dx>0?2:1):(dy>0?0:3);
  if (sp.frameTimer>140){sp.animStep=(sp.animStep+1)%4;sp.frameTimer=0;}
  return false;
}

function animateZoneSprites(dt) {
  for (var i=0;i<zoneSprites.length;i++) {
    var sp=zoneSprites[i]; sp.frameTimer+=dt;
    animateBubble(sp,dt);

    if (sp.state==='entering') {
      // Follow entry path waypoints
      var arrived = moveTowards(sp, dt, 0.7);
      if (arrived) {
        sp.entryStep++;
        if (sp.entryStep < sp.entryPath.length) {
          // Next waypoint
          sp.targetX=sp.entryPath[sp.entryStep].x;
          sp.targetY=sp.entryPath[sp.entryStep].y;
        } else {
          // Path complete — walk to assigned slot
          sp.targetX=sp.homeX; sp.targetY=sp.homeY;
          sp.state='walk';
        }
      }
    } else if (sp.state==='walk') {
      var arrived2 = moveTowards(sp, dt, 0.6);
      if (arrived2) {
        sp.state='idle';sp.direction=0;sp.animStep=0;
        if (sp.isWandering){sp.isWandering=false;sp.wanderTimer=4000+Math.random()*6000;}
      }
    } else {
      // Idle
      sp.animStep=0;
      sp.wanderTimer-=dt;
      if (sp.wanderTimer<=0&&!sp.isWandering) {
        sp.isWandering=true;
        var dest = randomWalkablePoint(sp.zone);
        sp.targetX=dest.x; sp.targetY=dest.y;
        sp.state='walk';sp.frameTimer=0; sp.wanderTimer=2500+Math.random()*3000;
      }
      if (sp.isWandering&&sp.state!=='walk') {
        sp.wanderTimer-=dt;
        if (sp.wanderTimer<=0){sp.targetX=sp.homeX;sp.targetY=sp.homeY;sp.state='walk';sp.frameTimer=0;}
      }
    }
  }
}

// ─────────────────────────────────────────────
//  INTERACTION — CLICK
// ─────────────────────────────────────────────
canvas.addEventListener('click', function(e) {
  var rect=canvas.getBoundingClientRect();
  var scX=CW/rect.width, scY=CH/rect.height;
  var cx=Math.round((e.clientX-rect.left)*scX), cy=Math.round((e.clientY-rect.top)*scY);

  if (viewMode==='general') {
    var hit=hitTestGeneral(cx,cy);
    if (hit) {
      if (selectedSprite===hit){selectedSprite=null;updateSelectedPanel(null);}
      else {selectedSprite=hit;hit.bubbleVisible=true;hit.bubbleAlpha=1;hit.bubbleTimer=4000;updateSelectedPanel(hit);}
      return;
    }
    for (var z in ZONE_DATA) {
      var r=ZONE_DATA[z].region;
      if (cx>=r.x&&cx<=r.x+r.w&&cy>=r.y&&cy<=r.y+r.h){enterZone(z);return;}
    }
    selectedSprite=null;updateSelectedPanel(null);
  } else if (viewMode==='zone') {
    var hit2=hitTestZone(cx,cy);
    if (hit2) {
      if (selectedSprite===hit2){selectedSprite=null;updateSelectedPanel(null);}
      else {selectedSprite=hit2;hit2.bubbleVisible=true;hit2.bubbleAlpha=1;hit2.bubbleTimer=4000;updateSelectedPanel(hit2);}
    } else {selectedSprite=null;updateSelectedPanel(null);}
  }
});

function hitTestGeneral(cx,cy) {
  var gs=GENERAL_SPRITE_SCALE;
  for (var i=0;i<generalSprites.length;i++) {
    var sp=generalSprites[i];
    if (Math.abs(cx-sp.x)<16*gs&&Math.abs(cy-sp.y)<20*gs) return sp;
  }
  return null;
}

function hitTestZone(cx,cy) {
  if (!currentZone) return null;
  var t=getZoneTransform(currentZone);
  var ss=t.scale*SPRITE_SCALE;
  var zoneSps=zoneSprites.filter(function(s){return s.zone===currentZone;});
  for (var i=0;i<zoneSps.length;i++) {
    var sp=zoneSps[i];
    var sx=t.offX+sp.x*t.scale, sy=t.offY+sp.y*t.scale;
    if (Math.abs(cx-sx)<18*ss&&Math.abs(cy-sy)<34*ss) return sp;
  }
  return null;
}

// ─────────────────────────────────────────────
//  INTERACTION — HOVER / TOOLTIP
// ─────────────────────────────────────────────
canvas.addEventListener('mousemove', function(e) {
  var rect=canvas.getBoundingClientRect();
  var mx=(e.clientX-rect.left)*(CW/rect.width), my=(e.clientY-rect.top)*(CH/rect.height);
  var hit=null; hoveredZone=null;

  if (viewMode==='general') {
    hit=hitTestGeneral(mx,my);
    if (!hit) {
      for (var z in ZONE_DATA) {
        var r=ZONE_DATA[z].region;
        if (mx>=r.x&&mx<=r.x+r.w&&my>=r.y&&my<=r.y+r.h){hoveredZone=z;break;}
      }
    }
  } else if (viewMode==='zone') { hit=hitTestZone(mx,my); }

  hoveredSprite=hit;
  if (hit) {
    var unitStr=hit.unit?(Array.isArray(hit.unit)?hit.unit.join(', '):hit.unit):'';
    tooltipEl.textContent='';
    var frag=document.createDocumentFragment();
    var ttN=document.createElement('div');ttN.className='tt-name';ttN.textContent=hit.name;frag.appendChild(ttN);
    if (unitStr){var ttU=document.createElement('div');ttU.className='tt-unit';ttU.textContent=unitStr;frag.appendChild(ttU);}
    var ttA=document.createElement('div');ttA.className='tt-act';ttA.style.color=ACTIVITY_COLORS[hit.activity];
    ttA.textContent=ACTIVITY_LABELS[hit.activity];frag.appendChild(ttA);
    if (hit.companions&&hit.companions.length>0) {
      var cn=[];for(var ci=0;ci<hit.companions.length;ci++){var cid=hit.companions[ci];cn.push(SURGEONS[cid]?SURGEONS[cid].split(' ').pop():cid);}
      var ttC=document.createElement('div');ttC.className='tt-comp';ttC.textContent='\u21B3 '+cn.join(', ');frag.appendChild(ttC);
    }
    tooltipEl.appendChild(frag);
    tooltipEl.style.left=(e.clientX+14)+'px';tooltipEl.style.top=(e.clientY-10)+'px';
    tooltipEl.classList.add('visible');canvas.style.cursor='pointer';
  } else {
    tooltipEl.classList.remove('visible');
    canvas.style.cursor=hoveredZone?'pointer':'default';
  }
});

canvas.addEventListener('mouseleave', function() {
  hoveredSprite=null;hoveredZone=null;tooltipEl.classList.remove('visible');canvas.style.cursor='default';
});

//  SELECTED PANEL (safe DOM methods)
// ─────────────────────────────────────────────
function updateSelectedPanel(sp) {
  var panel=document.getElementById('selected-panel');
  var info=document.getElementById('selected-info');
  if (!sp) {panel.style.display='none';return;}
  panel.style.display='';
  panel.style.animation='none';panel.offsetHeight;panel.style.animation='fadeInUp 0.3s ease-out';

  // Clear and rebuild with DOM methods
  while(info.firstChild) info.removeChild(info.firstChild);

  var nameDiv=document.createElement('div');
  nameDiv.style.cssText='font-size:14px;font-weight:700;color:var(--text)';
  nameDiv.textContent=sp.name;
  info.appendChild(nameDiv);

  var unitStr=sp.unit?(Array.isArray(sp.unit)?sp.unit.join(', '):sp.unit):'';
  if (unitStr) {
    var unitDiv=document.createElement('div');
    unitDiv.style.cssText='font-size:11px;color:var(--text-muted)';
    unitDiv.textContent=unitStr;
    info.appendChild(unitDiv);
  }

  var actDiv=document.createElement('div');
  actDiv.style.marginTop='4px';
  var actBadge=document.createElement('span');
  var actColor=ACTIVITY_COLORS[sp.activity]||'var(--text)';
  actBadge.style.cssText='display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600;color:white;background:'+actColor;
  actBadge.textContent=ACTIVITY_LABELS[sp.activity]||sp.activity;
  actDiv.appendChild(actBadge);
  info.appendChild(actDiv);

  var zoneName=sp.zone?ZONE_DATA[sp.zone].label:(FLOOR_NAMES[sp.floor]||'');
  var zoneDiv=document.createElement('div');
  zoneDiv.style.cssText='font-size:11px;color:var(--text-muted);margin-top:4px';
  zoneDiv.textContent='Zona: '+zoneName;
  info.appendChild(zoneDiv);

  if (sp.companions&&sp.companions.length>0) {
    var cn=[];
    for(var ci=0;ci<sp.companions.length;ci++){var cid=sp.companions[ci];cn.push(SURGEONS[cid]?SURGEONS[cid].split(' ').pop():cid);}
    var compDiv=document.createElement('div');
    compDiv.style.cssText='font-size:11px;color:var(--text-muted);margin-top:2px';
    compDiv.textContent='Con: '+cn.join(', ');
    info.appendChild(compDiv);
  }
}

  document.getElementById('btn-shift-m').classList.toggle('active',s==='M');
  document.getElementById('btn-shift-t').classList.toggle('active',s==='T');

  }

// ─────────────────────────────────────────────
//  SELECT DAY
// ─────────────────────────────────────────────
function selectDay(day) {
  if (!day) return;
  selectedDay=day;
  if (viewMode==='zone') {
    viewMode='general';currentZone=null;
    document.getElementById('btn-back').style.display='none';
    document.getElementById('zone-label').style.display='none';
    var btns=document.querySelectorAll('.zone-btn');
    for(var i=0;i<btns.length;i++) btns[i].classList.remove('active');
  }

  var activities=getDayActivities(day,currentMonth,currentYear);
  buildSprites(activities);

  var zoneCounts={quirofanos:0,consultas:0,urgencias:0,planta:0};
  var totalVisible=0;
  for(var i=0;i<activities.length;i++){
    if(isActivityVisible(activities[i].activity,timeShift)){
      totalVisible++;
      var z=ACTIVITY_ZONE[activities[i].activity];
      if(z) zoneCounts[z]++;
    }
  }

  var dow=new Date(currentYear,currentMonth,day).getDay();
  var dowIdx=dow===0?6:dow-1;
  document.getElementById('day-title').textContent=DAY_NAMES_FULL[dowIdx]+' '+day+' '+MONTH_NAMES[currentMonth];
  document.getElementById('day-count').textContent=totalVisible;

  var fcEl=document.getElementById('floor-counts');
  while(fcEl.firstChild) fcEl.removeChild(fcEl.firstChild);
  var zoneOrder=['quirofanos','consultas','urgencias','planta'];
  for(var zi=0;zi<zoneOrder.length;zi++){
    var zk=zoneOrder[zi];
    var row=document.createElement('div');row.className='floor-count-row';
    var dot=document.createElement('div');dot.className='floor-dot';dot.style.background=ZONE_DATA[zk].color;
    row.appendChild(dot);
    row.appendChild(document.createTextNode(ZONE_DATA[zk].label+': '+zoneCounts[zk]));
    fcEl.appendChild(row);
  }

  var prev=document.querySelectorAll('.mini-cal-day.selected');
  for(var pi=0;pi<prev.length;pi++) prev[pi].classList.remove('selected');
  var dayEl=document.querySelector('.mini-cal-day[data-day="'+day+'"]');
  if (dayEl) dayEl.classList.add('selected');
}

function renderMiniCal() {
  var grid=document.getElementById('mini-cal');
  grid.textContent='';
  document.getElementById('cal-month-label').textContent=MONTH_NAMES[currentMonth]+' '+currentYear;

  for(var di=0;di<DAY_NAMES_SHORT.length;di++){
    var hdr=document.createElement('div');hdr.className='mini-cal-hdr';
    hdr.textContent=DAY_NAMES_SHORT[di];grid.appendChild(hdr);
  }

  var firstDay=new Date(currentYear,currentMonth,1).getDay();
  var startOffset=firstDay===0?6:firstDay-1;
  var daysInMonth=new Date(currentYear,currentMonth+1,0).getDate();
  var today=new Date();
  var daysWithData={};
  if (parsedData) {
    for(var sid in parsedData){
      for(var i=0;i<parsedData[sid].length;i++){
        var e=parsedData[sid][i];
        if(e.month===currentMonth&&e.year===currentYear) daysWithData[e.day]=true;
      }
    }
  }
  for(var i=0;i<startOffset;i++){var empty=document.createElement('div');empty.className='mini-cal-day empty';grid.appendChild(empty);}
  for(var d=1;d<=daysInMonth;d++){
    var cell=document.createElement('div');cell.className='mini-cal-day';
    cell.textContent=d;cell.setAttribute('data-day',d);
    var dow=new Date(currentYear,currentMonth,d).getDay();
    if(dow===0||dow===6)cell.classList.add('weekend');
    if(d===today.getDate()&&currentMonth===today.getMonth()&&currentYear===today.getFullYear())cell.classList.add('today');
    if(!daysWithData[d])cell.classList.add('no-data');
    else cell.addEventListener('click',(function(dd){return function(){selectDay(dd);};})(d));
    if(d===selectedDay)cell.classList.add('selected');
    grid.appendChild(cell);
  }
}

function navigateMonth(delta) {
  var idx=-1;
  for(var i=0;i<availableMonths.length;i++){
    if(availableMonths[i].month===currentMonth&&availableMonths[i].year===currentYear){idx=i;break;}
  }
  var newIdx=idx+delta;
  if(newIdx>=0&&newIdx<availableMonths.length){
    currentMonth=availableMonths[newIdx].month;currentYear=availableMonths[newIdx].year;
    selectedDay=null;generalSprites=[];zoneSprites=[];
    renderMiniCal();renderAll();
    document.getElementById('day-title').textContent='\u2014';
    document.getElementById('day-count').textContent='0';
    document.getElementById('floor-counts').textContent='';
    for(var z in ZONE_DATA){var el=document.getElementById('count-'+z);if(el)el.textContent='0';}
  }
}

  var todayInData=availableMonths.some(function(m){return m.month===now.getMonth()&&m.year===now.getFullYear();});
  if(todayInData){currentMonth=now.getMonth();currentYear=now.getFullYear();}
  else if(availableMonths.length>0){currentMonth=availableMonths[0].month;currentYear=availableMonths[0].year;}

  renderMiniCal();renderLegend();renderAll();
  if(todayInData) selectDay(now.getDate());

  document.getElementById('cal-prev').addEventListener('click',function(){navigateMonth(-1);});
  document.getElementById('cal-next').addEventListener('click',function(){navigateMonth(1);});

  requestAnimationFrame(gameLoop);
} else {
  document.getElementById('no-data').style.display='';
}

if (location.hostname==='localhost'||location.hostname==='127.0.0.1') {
  var extLinks=document.querySelectorAll('a[href^="https://jmacot.github.io"]');
  for(var eli=0;eli<extLinks.length;eli++){extLinks[eli].removeAttribute('href');extLinks[eli].style.opacity='0.4';extLinks[eli].style.pointerEvents='none';}
}
</script>
</body>
