<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hospital COT — Vista Top-Down</title>
  <link rel="icon" type="image/png" href="icon.png">
  <meta name="theme-color" id="meta-theme" content="#1a3a5c">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lora:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #e5eaf2; --surface: #ffffff; --surface2: #dbe2ec;
      --border: #e2e8f0; --border-light: #e5e7eb;
      --accent: #1a3a5c; --accent-light: #eef2f7; --accent-hover: #14304f;
      --text: #222222; --text-muted: #555555; --text-light: #888888;
      --green: #16a34a; --green-light: #dcfce7;
      --amber: #c0540a; --amber-light: #fef3c7;
      --red: #dc2626; --red-light: #fee2e2;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.08);
      --radius-sm: 8px; --radius: 16px; --radius-lg: 24px;
    }
    [data-theme="dark"] {
      --bg: #111827; --surface: #1f2937; --surface2: #283244;
      --border: #374151; --border-light: #4b5563;
      --text: #f1f5f9; --text-muted: #a8b8cc; --text-light: #64748b;
      --accent: #93c5fd; --accent-hover: #bae0ff; --accent-light: #1e3a5f;
      --green: #4ade80; --green-light: #14352a;
      --red: #f87171; --red-light: #3b1010;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', Arial, sans-serif; background: var(--bg);
      color: var(--text); min-height: 100vh; padding: 30px 20px;
    }
    .app-container { max-width: 1200px; margin: 0 auto; }
    .back-home {
      position: fixed; top: 10px; left: 10px;
      display: inline-flex; align-items: center; gap: 4px;
      font-family: 'SF Mono', 'Consolas', monospace; font-size: 11px;
      color: var(--text-muted); text-decoration: none;
      padding: 6px 12px; border-radius: 999px;
      border: 1.5px solid var(--border); background: var(--surface);
      box-shadow: 0 1px 4px rgba(0,0,0,0.08); z-index: 100;
    }
    .back-home:hover { border-color: var(--accent); color: var(--accent); }
    .app-header {
      text-align: center; margin-bottom: 16px; position: relative;
      background: linear-gradient(135deg, #0f2240 0%, #1a3a5c 50%, #234e77 100%);
      color: white; padding: 28px 32px 24px;
      border-radius: var(--radius-lg); overflow: hidden;
      box-shadow: 0 8px 32px rgba(15,34,64,0.25);
      animation: fadeInUp 0.6s ease-out;
    }
    .app-header::before {
      content: ''; position: absolute; top: -80px; right: -30px;
      width: 250px; height: 250px; border-radius: 50%;
      background: radial-gradient(circle, rgba(14,165,233,0.12) 0%, transparent 70%);
      filter: blur(40px);
    }
    .app-header h1 {
      font-family: 'Lora', serif; color: white; position: relative;
      font-size: clamp(1.3rem, 3vw, 1.7rem); font-weight: 700;
    }
    .app-header p { font-size: 13px; color: rgba(255,255,255,0.6); margin-top: 4px; position: relative; }
    [data-theme="dark"] .app-header {
      background: linear-gradient(135deg, #152238 0%, #1c2f4a 50%, #213656 100%);
    }
    .theme-toggle {
      position: absolute; top: 12px; right: 12px;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2);
      border-radius: 50%; width: 36px; height: 36px; font-size: 1rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      z-index: 1; color: white;
    }
    .theme-toggle:hover { border-color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.12); }

    .main-layout { display: flex; gap: 16px; }
    .sidebar { width: 180px; flex-shrink: 0; display: flex; flex-direction: column; gap: 10px; }
    .sidebar-card {
      background: var(--surface); border: 1px solid var(--border-light);
      border-radius: var(--radius); padding: 12px; box-shadow: var(--shadow-sm);
    }
    .sidebar-card h3 {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.5px; color: var(--text-light); margin-bottom: 8px;
    }

    .mini-cal { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
    .mini-cal-hdr { text-align: center; font-size: 9px; font-weight: 700; color: var(--text-light); padding: 2px 0; }
    .mini-cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
    .mini-cal-nav span { font-size: 11px; font-weight: 700; }
    .mini-cal-nav button {
      background: none; border: 1px solid var(--border); border-radius: 4px;
      width: 22px; height: 22px; cursor: pointer; font-size: 10px;
      color: var(--text-muted); display: flex; align-items: center; justify-content: center;
    }
    .mini-cal-day {
      text-align: center; font-size: 10px; padding: 3px 0; border-radius: 4px;
      cursor: pointer; color: var(--text);
    }
    .mini-cal-day:hover { background: var(--accent-light); }
    .mini-cal-day.today { font-weight: 700; }
    .mini-cal-day.selected { background: var(--accent); color: white; font-weight: 700; border-radius: 6px; }
    .mini-cal-day.weekend { color: var(--red); }
    .mini-cal-day.has-data { font-weight: 600; }
    .mini-cal-day.no-data { opacity: 0.35; }

    .day-info { font-size: 12px; line-height: 1.6; }
    .day-info .day-title { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
    .day-info .day-count { font-size: 20px; font-weight: 700; color: var(--accent); }
    .floor-count-row { display: flex; align-items: center; gap: 6px; font-size: 11px; }
    .floor-dot { width: 8px; height: 8px; border-radius: 50%; }

    .canvas-area { flex: 1; min-width: 0; }
    .canvas-wrap {
      position: relative; background: #1a1a2e; border-radius: var(--radius);
      overflow: hidden; box-shadow: var(--shadow);
    }
    .canvas-wrap.zoomable {
      overflow: scroll; -webkit-overflow-scrolling: touch;
      max-height: 60vh; touch-action: pan-x pan-y;
    }
    #game-canvas {
      display: block; width: 100%; height: auto;
      image-rendering: pixelated; image-rendering: crisp-edges;
      transform-origin: 0 0;
    }
    .zoom-controls {
      display: none; align-items: center; justify-content: center; gap: 6px;
      margin-top: 6px;
    }
    .zoom-btn {
      width: 32px; height: 32px; border-radius: 8px; border: 1.5px solid var(--border);
      background: var(--surface); color: var(--text); font-size: 16px; font-weight: 700;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-family: 'Inter', sans-serif; transition: all 0.2s;
    }
    .zoom-btn:hover { border-color: var(--accent); color: var(--accent); }
    .zoom-btn:active { transform: scale(0.95); }
    .zoom-label { font-size: 11px; font-weight: 600; color: var(--text-muted); min-width: 36px; text-align: center; }
    @media (max-width: 700px) {
      .zoom-controls { display: flex; }
    }

    .turno-toggle {
      display: flex; gap: 2px;
      background: var(--surface2); border-radius: 8px; padding: 2px;
    }
    .turno-btn {
      flex: 1; padding: 5px 0; border: none; background: none;
      font-size: 10px; font-weight: 600; color: var(--text-muted);
      border-radius: 6px; cursor: pointer; transition: all 0.2s;
      font-family: 'Inter', sans-serif;
    }
    .turno-btn.active {
      background: var(--surface); color: var(--text);
      box-shadow: var(--shadow-sm);
    }
    .turno-btn:hover:not(.active) { color: var(--text); }

    .pixel-tooltip {
      position: fixed; pointer-events: none; z-index: 9999;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 12px; font-size: 11px;
      box-shadow: var(--shadow); opacity: 0; transition: opacity 0.15s;
      max-width: 200px; line-height: 1.5;
    }
    .pixel-tooltip.visible { opacity: 1; }

    .no-data-msg {
      text-align: center; padding: 60px 20px; color: var(--text-muted);
    }
    .no-data-msg a {
      display: inline-block; margin-top: 12px; padding: 10px 24px;
      background: var(--accent); color: white; border-radius: 8px;
      text-decoration: none; font-weight: 700; font-size: 13px;
    }

    .app-footer { text-align: center; padding: 8px 0; }
    .app-footer span { font-size: 0.7rem; color: var(--text-light); }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @media (max-width: 700px) {
      body { padding: 16px 10px; }
      .main-layout { flex-direction: column; gap: 8px; }
      .sidebar {
        width: 100%; flex-direction: row; flex-wrap: wrap; gap: 6px;
      }
      .sidebar-card { padding: 8px 10px; min-width: 0; }
      /* Calendar + turno side by side */
      .sidebar-card:nth-child(1) { flex: 1 1 55%; }
      .sidebar-card:nth-child(2) { flex: 1 1 auto; align-self: stretch; display: flex; flex-direction: column; }
      .sidebar-card:nth-child(2) .turno-toggle { flex-direction: column; flex: 1; }
      .sidebar-card:nth-child(2) .turno-btn { flex: 1; font-size: 13px; padding: 8px 0; }
      /* Day info + selected panel full width */
      .sidebar-card:nth-child(3) { flex: 1 1 100%; }
      .sidebar-card:nth-child(3) .floor-counts { display: flex; gap: 10px; flex-wrap: wrap; }
      .sidebar-card:nth-child(3) .day-info { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
      .sidebar-card:nth-child(3) .day-info .day-title { margin-bottom: 0; }
      .sidebar-card:nth-child(3) .day-info .day-count { font-size: 16px; }
      #selected-panel { flex: 1 1 100%; }
      .sidebar-card h3 { font-size: 9px; margin-bottom: 4px; }
      .turno-toggle { gap: 1px; }
      .turno-btn { padding: 4px 0; font-size: 10px; }
      .app-header { padding: 20px 16px 16px; border-radius: var(--radius); margin-bottom: 4px; }
      .app-header::before { display: none; }
      .app-header h1 { font-size: 1.2rem; }
      .back-home { padding: 3px 6px; font-size: 9px; top: 6px; left: 6px; }
    }
    /* ─── Splash screen ─── */
    #splash {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      z-index: 10000; display: flex; align-items: center; justify-content: center;
    }
    .splash-bg {
      width: 100%; height: 100%;
      background: radial-gradient(ellipse at center, #1a1040 0%, #0a0a1a 70%, #000 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 32px; position: relative; overflow: hidden;
    }
    .splash-rings {
      position: absolute; top: 50%; left: 50%;
      width: 600px; height: 600px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(ellipse at center,
        transparent 30%,
        rgba(100, 80, 160, 0.06) 35%,
        transparent 40%,
        rgba(100, 80, 160, 0.05) 45%,
        transparent 50%,
        rgba(100, 80, 160, 0.04) 55%,
        transparent 60%,
        rgba(100, 80, 160, 0.03) 65%,
        transparent 70%,
        rgba(100, 80, 160, 0.02) 80%,
        transparent 100%
      );
      animation: splashPulse 3s ease-in-out infinite;
    }
    @keyframes splashPulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.7; }
      50% { transform: translate(-50%, -50%) scale(1.08); opacity: 1; }
    }
    .splash-logo {
      max-width: min(500px, 80vw); height: auto;
      position: relative; z-index: 1;
      animation: splashLogoIn 1.2s cubic-bezier(0.16, 1, 0.3, 1) both;
      filter: drop-shadow(0 0 40px rgba(100, 60, 180, 0.3));
    }
    @keyframes splashLogoIn {
      from { opacity: 0; transform: scale(0.85); filter: drop-shadow(0 0 0 transparent); }
      to { opacity: 1; transform: scale(1); filter: drop-shadow(0 0 40px rgba(100, 60, 180, 0.3)); }
    }
    .splash-enter {
      position: relative; z-index: 1;
      padding: 14px 40px; border-radius: 999px;
      border: 2px solid rgba(140, 120, 200, 0.4);
      background: rgba(140, 120, 200, 0.1);
      color: rgba(255, 255, 255, 0.85);
      font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase;
      cursor: pointer; transition: all 0.3s ease;
      animation: splashBtnIn 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.4s both;
    }
    @keyframes splashBtnIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .splash-enter:hover {
      background: rgba(140, 120, 200, 0.25);
      border-color: rgba(140, 120, 200, 0.7);
      color: white;
      box-shadow: 0 0 30px rgba(100, 60, 180, 0.3);
      transform: translateY(-2px);
    }
    .splash-enter:active { transform: translateY(0); }
    #splash.fade-out {
      animation: splashOut 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    @keyframes splashOut {
      0% { opacity: 1; }
      100% { opacity: 0; pointer-events: none; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
<div class="app-container">
  <a class="back-home" href="index.html" title="Volver al Planning">&#8592; Inicio</a>
  <div class="app-header">

  </div>

  <div id="no-data" class="no-data-msg" style="display:none">

    <a href="index.html">Ir al Planning para cargar Excel</a>
  </div>

  <!-- Splash screen -->
  <div id="splash" style="display:none">
    <div class="splash-bg">
      <div class="splash-rings"></div>
      <button class="splash-enter" id="btn-enter">Entrar en el hospital</button>
    </div>
  </div>

  <div id="main-content" style="display:none">
    <div class="main-layout">
      <div class="sidebar">
        <div class="sidebar-card">
          <div class="mini-cal-nav">
            <button id="cal-prev" title="Mes anterior">&lt;</button>

        <div class="sidebar-card">
          <h3>Turno</h3>
          <div class="turno-toggle">

            <button class="turno-btn" data-turno="t">Tarde</button>
          </div>
        </div>
        <div class="sidebar-card">
          <h3>Dia seleccionado</h3>
          <div class="day-info">
            <div class="day-title" id="day-title">&#8212;</div>
            <div><span class="day-count" id="day-count">0</span> <span style="color:var(--text-muted);font-size:12px">cirujanos</span></div>
            <div class="floor-counts" id="floor-counts"></div>
          </div>
        </div>
        <div class="sidebar-card" id="selected-panel" style="display:none">
          <h3>Cirujano seleccionado</h3>
          <div id="selected-info"></div>
        </div>
      </div>
      <div class="canvas-area">
        <div class="canvas-wrap" id="canvas-wrap">
          <canvas id="game-canvas" width="640" height="480"></canvas>
        </div>
        <div class="zoom-controls" id="zoom-controls">
          <button class="zoom-btn" id="zoom-out" title="Alejar">−</button>
          <span class="zoom-label" id="zoom-label">100%</span>
          <button class="zoom-btn" id="zoom-in" title="Acercar">+</button>
          <button class="zoom-btn" id="zoom-reset" title="Restablecer">⟲</button>
        </div>
      </div>
    </div>
  </div>

  <div class="app-footer"><span>COT &#8212; Hospital Top-Down v0.1 (Prototipo)</span></div>
</div>
<div class="pixel-tooltip" id="tooltip"></div>

<script>
// ─────────────────────────────────────────────
//  THEME
// ─────────────────────────────────────────────
var btnTheme = document.getElementById('btn-theme');
function applyTheme(dark) {
  var m = document.getElementById('meta-theme');
  if (dark) {
    document.documentElement.setAttribute('data-theme', 'dark');
    btnTheme.textContent = '\u2600\uFE0F';
    if (m) m.setAttribute('content', '#0a1628');
  } else {
    document.documentElement.removeAttribute('data-theme');
    btnTheme.textContent = '\uD83C\uDF19';
    if (m) m.setAttribute('content', '#1a3a5c');
  }
}
function getAutoTheme() {
  var h = new Date().getHours();
  return (h >= 21 || h < 7 || window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
}
function initTheme() {
  var saved = localStorage.getItem('theme');
  var savedDate = localStorage.getItem('theme-date');
  var today = new Date().toDateString();
  if (saved && savedDate === today) applyTheme(saved === 'dark');
  else applyTheme(getAutoTheme() === 'dark');
}
btnTheme.addEventListener('click', function() {
  var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  applyTheme(!isDark);
  localStorage.setItem('theme', isDark ? 'dark' : 'light');
  localStorage.setItem('theme-date', new Date().toDateString());
  tileCache = null;
});

// ─────────────────────────────────────────────
//  DATA
// ─────────────────────────────────────────────
var parsedData, SURGEONS, SURGEON_UNITS;
function loadData() {
  try {
    parsedData = JSON.parse(localStorage.getItem('planning-parsedData'));
    SURGEONS = JSON.parse(localStorage.getItem('planning-surgeons'));
    SURGEON_UNITS = JSON.parse(localStorage.getItem('planning-units')) || {};
    return parsedData && SURGEONS;
  } catch (e) { return false; }
}

var tileMap = [];
(function buildMap() {
  for (var r = 0; r < ROWS; r++) {
    tileMap[r] = [];
    for (var c = 0; c < COLS; c++) {
      if (r === 0 || r === ROWS - 1 || c === 0 || c === COLS - 1) { tileMap[r][c] = 0; continue; }
      if (r >= 1 && r <= 3) { tileMap[r][c] = 2; continue; }
      if (r === 4) { tileMap[r][c] = 1; continue; }
      if (r >= 5 && r <= 8) { tileMap[r][c] = 3; continue; }
      if (r === 9) { tileMap[r][c] = 1; continue; }
      if (r >= 10 && r <= 13) { tileMap[r][c] = 4; continue; }
      tileMap[r][c] = 1;
    }
  }
  // Room dividers — quirofanos
  for (var r = 1; r <= 3; r++) { tileMap[r][5] = 0; tileMap[r][10] = 0; tileMap[r][15] = 0; }
  // Room dividers — consultas
  for (var r = 5; r <= 8; r++) { tileMap[r][5] = 0; tileMap[r][10] = 0; tileMap[r][15] = 0; }
  // Room dividers — urgencias
  for (var r = 10; r <= 13; r++) { tileMap[r][6] = 0; tileMap[r][13] = 0; }
  // Saliente room — bottom-left (cols 1-5, rows 10-13), warm cozy floor
  for (var r = 10; r <= 13; r++) {
    for (var c = 1; c <= 5; c++) { tileMap[r][c] = 5; }
  }
  // Diferida lounge — central urgencias room (cols 7-12, rows 10-13), wooden floor
  for (var r = 10; r <= 13; r++) {
    for (var c = 7; c <= 12; c++) { tileMap[r][c] = 6; }
  }
})();

// Green outfit (hue-rotated from blue outfit5)
function _h2r(p,q,t){t=((t%1)+1)%1;return t<1/6?p+(q-p)*6*t:t<.5?q:t<2/3?p+(q-p)*(2/3-t)*6:p;}
var imgGreenOutfit = null;
function createGreenOutfit() {
  var src = imgOutfits['outfit5'];
  if (!src || !src.complete || !src.naturalWidth) return;
  var cv = document.createElement('canvas');
  cv.width = src.width; cv.height = src.height;
  var c2 = cv.getContext('2d');
  c2.drawImage(src, 0, 0);
  var id = c2.getImageData(0, 0, cv.width, cv.height), d = id.data;
  for (var i = 0; i < d.length; i += 4) {
    if (d[i+3] < 10) continue;
    var r=d[i]/255, g=d[i+1]/255, b=d[i+2]/255;
    var mx=Math.max(r,g,b), mn=Math.min(r,g,b), l=(mx+mn)/2;
    var s = mx===mn ? 0 : (l>0.5 ? (mx-mn)/(2-mx-mn) : (mx-mn)/(mx+mn));
    var h=0.33; s=Math.min(1,s*1.4); var qq=l<0.5?l*(1+s):l+s-l*s, pp=2*l-qq;
    d[i]=Math.round(_h2r(pp,qq,h+1/3)*255);
    d[i+1]=Math.round(_h2r(pp,qq,h)*255);
    d[i+2]=Math.round(_h2r(pp,qq,h-1/3)*255);
  }
  c2.putImageData(id, 0, 0);
  imgGreenOutfit = cv;
  tileCache = null;
}
imgOutfits['outfit5'].addEventListener('load', createGreenOutfit);

var DIR_DOWN = 0, DIR_LEFT = 1, DIR_RIGHT = 2, DIR_UP = 3;

// Zone color for outfit indicator
var OUTFIT_INDICATOR = {
  'green': '#22c55e',   // quirófano = green
  'outfit1': '#3b82f6', // consulta = blue/white

function drawChar(px, py, skinRow, hairRow, outfitKey, dir, frame) {
  if (imagesLoaded < totalImages) return;
  var fi = dir * 6 + (frame % 6);
  var sx = fi * 32;
  ctx.imageSmoothingEnabled = false;

  // Colored ring under sprite to distinguish zone
  var ringColor = OUTFIT_INDICATOR[outfitKey];
  if (ringColor) {
    ctx.save();
    ctx.globalAlpha = 0.5;
    ctx.strokeStyle = ringColor;
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.ellipse(px, py + 2, 14, 7, 0, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 0.15;
    ctx.fillStyle = ringColor;
    ctx.beginPath();
    ctx.ellipse(px, py + 2, 14, 7, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // Shadow
  ctx.globalAlpha = 0.3;
  ctx.drawImage(imgShadow, 0, 0, 32, 32, px - HALF, py - HALF * 0.3, SPRITE_SCALE, SPRITE_SCALE);
  ctx.globalAlpha = 1;
  // Body
  ctx.drawImage(imgBody, sx, skinRow * 32, 32, 32, px - HALF, py - SPRITE_SCALE + 6, SPRITE_SCALE, SPRITE_SCALE);
  // Outfit
  if (outfitKey === 'green' && imgGreenOutfit) {
    ctx.drawImage(imgGreenOutfit, sx, 0, 32, 32, px - HALF, py - SPRITE_SCALE + 6, SPRITE_SCALE, SPRITE_SCALE);
  } else {
    var oi = imgOutfits[outfitKey];
    if (oi && oi.complete) ctx.drawImage(oi, sx, 0, 32, 32, px - HALF, py - SPRITE_SCALE + 6, SPRITE_SCALE, SPRITE_SCALE);
  }
  // Hair
  if (imgHairs.complete) ctx.drawImage(imgHairs, sx, hairRow * 32, 32, 32, px - HALF, py - SPRITE_SCALE + 6, SPRITE_SCALE, SPRITE_SCALE);
}

function drawBubble(px, py, text, alpha) {
  ctx.save(); ctx.globalAlpha = alpha;

  var tw = ctx.measureText(text).width;
  var bw = tw + 10, bh = 14, bx = px - bw / 2, by = py - SPRITE_SCALE - 18;
  ctx.fillStyle = 'rgba(255,255,255,0.92)';
  ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 4); ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.12)'; ctx.lineWidth = 0.5; ctx.stroke();
  ctx.beginPath(); ctx.moveTo(px-3,by+bh); ctx.lineTo(px,by+bh+4); ctx.lineTo(px+3,by+bh); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#333'; ctx.fillText(text, px, by + 10);
  ctx.restore();
}

function getDayActivities(day, month, year) {
  var result = [];
  if (!parsedData) return result;
  for (var sid in parsedData) {
    var entries = parsedData[sid];
    for (var i = 0; i < entries.length; i++) {
      var e = entries[i];
      if (e.day === day && e.month === month && e.year === year) {
        if (e.activity === 'diferida') {
          var hasG = entries.some(function(e2) {
            return e2.day === day && e2.month === month && e2.year === year && e2.activity === 'guardia';
          });
          if (hasG) continue;
        }
        result.push({ surgeonId: Number(sid), activity: e.activity, companions: e.companions || [] });
      }
    }
  }
  return result;
}

    outfit: ACTIVITY_OUTFIT[a.activity] || ZONE_OUTFIT[fi],
    homeX: t.x * TILE + TILE / 2, homeY: t.y * TILE + TILE / 2,
    targetX: t.x * TILE + TILE / 2, targetY: t.y * TILE + TILE / 2,

    dir: DIR_UP, frame: 0, frameTimer: 0, state: 'walk',
    wanderTimer: 4000 + Math.random() * 6000, isWandering: false,
    bubbleTimer: 3000 + Math.random() * 8000, bubbleVisible: false, bubbleAlpha: 0, bubbleText: '',
    idleTimer: 2000 + Math.random() * 3000
  };
}

function assignSprites(activities) {
  var floors = [[], [], []];
  for (var i = 0; i < activities.length; i++) {
    var f = FLOOR_MAP[activities[i].activity];
    if (f !== undefined) floors[f].push(activities[i]);
  }
  var placed = [];

  // ── Floor 2: Quirófanos — group by companion pairs ──
  var qxList = floors[2];
  var usedRooms = 0;
  var assignedQx = {};  // surgeonId → true (already placed)
  // Build companion groups: pair surgeons who list each other as companions
  var groups = [];
  for (var qi = 0; qi < qxList.length; qi++) {
    var a = qxList[qi];
    if (assignedQx[a.surgeonId]) continue;
    assignedQx[a.surgeonId] = true;
    var group = [a];
    // Find companions in the same qx list
    if (a.companions && a.companions.length > 0) {
      for (var ci = 0; ci < a.companions.length; ci++) {
        var compId = a.companions[ci];
        if (assignedQx[compId]) continue;
        for (var qi2 = 0; qi2 < qxList.length; qi2++) {
          if (qxList[qi2].surgeonId === compId && !assignedQx[compId]) {
            group.push(qxList[qi2]);
            assignedQx[compId] = true;
            break;
          }
        }
      }
    }
    groups.push(group);
  }
  // Assign each group to a QX room
  for (var gi = 0; gi < groups.length; gi++) {
    var grp = groups[gi];
    var roomIdx = usedRooms % QX_ROOMS.length;
    var roomPositions = QX_ROOMS[roomIdx];
    for (var si = 0; si < grp.length; si++) {
      var pos = roomPositions[si % roomPositions.length];
      placed.push(makeSprite(grp[si], pos, 2));
    }
    usedRooms++;
  }

  // ── Floor 1: Consultas — diferida now in urgencias area, separate here ──
  var consList = floors[1];
  var diferidaList = [];
  var otherConsList = [];
  for (var j = 0; j < consList.length; j++) {
    if (consList[j].activity === 'diferida' || consList[j].activity === 'diferida_t') {
      diferidaList.push(consList[j]);
    } else {
      otherConsList.push(consList[j]);
    }
  }
  // Place diferida in lounge (central urgencias room)
  for (var j = 0; j < diferidaList.length; j++) {
    var t = DIFERIDA_TARGETS[j % DIFERIDA_TARGETS.length];
    placed.push(makeSprite(diferidaList[j], t, 1));
  }
  // Place other consultas in all 4 rooms (C1-C4)
  var consTargets = ZONE_TARGETS[1];
  for (var j = 0; j < otherConsList.length; j++) {
    var t = consTargets[j % consTargets.length];
    placed.push(makeSprite(otherConsList[j], t, 1));
  }

  // ── Floor 0: Urgencias — saliente in cozy room, guardia+localizado in right room ──
  var urgList = floors[0];
  var salienteList = [];
  var otherUrgList = [];
  for (var j = 0; j < urgList.length; j++) {
    if (urgList[j].activity === 'saliente') {
      salienteList.push(urgList[j]);
    } else {
      otherUrgList.push(urgList[j]);
    }
  }
  // Place saliente in cozy room (bottom-left)
  for (var j = 0; j < salienteList.length; j++) {
    var t = SALIENTE_TARGETS[j % SALIENTE_TARGETS.length];
    placed.push(makeSprite(salienteList[j], t, 0));
  }
  // Place guardia + localizado in right urgencias room
  var urgTargets = ZONE_TARGETS[0];
  for (var j = 0; j < otherUrgList.length; j++) {
    var t = urgTargets[j % urgTargets.length];
    placed.push(makeSprite(otherUrgList[j], t, 0));
  }
  return placed;
}

// ─────────────────────────────────────────────
//  TILE RENDERING (cached) + FURNITURE
// ─────────────────────────────────────────────
var tileCache = null;
function renderTilesToCache() {
  var off = document.createElement('canvas'); off.width = CW; off.height = CH;
  var oc = off.getContext('2d');
  oc.imageSmoothingEnabled = false;
  var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  var colors = isDark ? ZONE_FLOOR.dark : ZONE_FLOOR.light;
  var T = TILE;

  // ── 1. Base floor colors ──
  for (var r = 0; r < ROWS; r++) {
    for (var c = 0; c < COLS; c++) {
      oc.fillStyle = colors[tileMap[r][c]];
      oc.fillRect(c*T, r*T, T, T);
    }
  }

  // ── 2. Real tile texture overlay ──
  var tilesOk = imgTilesH.complete && imgTilesH.naturalWidth > 0;
  if (tilesOk) {
    for (var r = 0; r < ROWS; r++) {
      for (var c = 0; c < COLS; c++) {
        var t = tileMap[r][c];
        if (t === 0) {
          oc.globalAlpha = isDark ? 0.25 : 0.7;
          oc.drawImage(imgTilesH, 256, 64, 32, 32, c*T, r*T, T, T);
        } else if (t === 1) {
          oc.globalAlpha = isDark ? 0.12 : 0.35;
          oc.drawImage(imgTilesH, 96, 64, 32, 32, c*T, r*T, T, T);
        } else if (t === 5) {
          // Saliente room — warmer wood-like tile
          oc.globalAlpha = isDark ? 0.15 : 0.4;
          oc.drawImage(imgTilesH, 160, 64, 32, 32, c*T, r*T, T, T);
        } else if (t === 6) {
          // Diferida lounge — wooden floor from TilesHouse
          var tilesHouseOk = imgTilesHouse.complete && imgTilesHouse.naturalWidth > 0;
          if (tilesHouseOk) {
            oc.globalAlpha = isDark ? 0.5 : 0.85;
            oc.drawImage(imgTilesHouse, 0, 32, 32, 32, c*T, r*T, T, T);
          } else {
            oc.globalAlpha = isDark ? 0.2 : 0.5;
            oc.drawImage(imgTilesH, 192, 64, 32, 32, c*T, r*T, T, T);
          }
        } else {
          oc.globalAlpha = isDark ? 0.1 : 0.5;
          oc.drawImage(imgTilesH, 32, 64, 32, 32, c*T, r*T, T, T);
        }
      }
    }
    oc.globalAlpha = 1;
  }

  // ── 3. Tile grid lines ──
  var gridC = isDark ? 'rgba(255,255,255,0.04)' : 'rgba(0,0,0,0.06)';
  oc.strokeStyle = gridC; oc.lineWidth = 0.5;
  for (var r = 0; r < ROWS; r++) {

// ─────────────────────────────────────────────
//  RENDER ALL
// ─────────────────────────────────────────────
function renderAll() {
  ctx.clearRect(0, 0, CW, CH);
  if (!tileCache) renderTilesToCache();
  ctx.drawImage(tileCache, 0, 0);

  var sorted = sprites.slice().sort(function(a, b) { return a.y - b.y; });
  for (var i = 0; i < sorted.length; i++) {
    var sp = sorted[i];
    if (sp === selectedSprite) drawGlow(sp.x, sp.y, '#3b82f6');
    else if (sp === hoveredSprite) drawGlow(sp.x, sp.y, '#60a5fa');
    drawChar(sp.x, sp.y, sp.skinRow, sp.hairRow, sp.outfit, sp.dir, Math.floor(sp.frame));
    drawNameTag(sp.x, sp.y, sp.name, sp === selectedSprite, sp.outfit);
    if (sp.bubbleVisible && sp.bubbleAlpha > 0.1) {
      drawBubble(sp.x, sp.y, sp.bubbleText || '...', sp.bubbleAlpha);
    }
  }
}

// ─────────────────────────────────────────────
//  GAME LOOP
// ─────────────────────────────────────────────
function gameLoop(ts) {
  var dt = ts - lastTime; lastTime = ts;
  if (dt > 100) { requestAnimationFrame(gameLoop); return; }

  for (var i = 0; i < sprites.length; i++) {
    var sp = sprites[i];
    sp.frameTimer += dt;
    // Bubble
    sp.bubbleTimer -= dt;
    if (sp.bubbleTimer <= 0) {
      if (!sp.bubbleVisible) { sp.bubbleVisible = true; sp.bubbleAlpha = 0; sp.bubbleText = getBubbleText(sp.activity); sp.bubbleTimer = 3000 + Math.random() * 2000; }
      else { sp.bubbleVisible = false; sp.bubbleTimer = 6000 + Math.random() * 10000; }
    }
    if (sp.bubbleVisible && sp.bubbleAlpha < 1) sp.bubbleAlpha = Math.min(1, sp.bubbleAlpha + dt / 300);
    if (!sp.bubbleVisible && sp.bubbleAlpha > 0) sp.bubbleAlpha = Math.max(0, sp.bubbleAlpha - dt / 200);

    if (sp.state === 'walk') {
      var speed = 1.2;
      var dx = sp.targetX - sp.x, dy = sp.targetY - sp.y;
      var dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 2) {
        sp.x = sp.targetX; sp.y = sp.targetY; sp.state = 'idle'; sp.frame = 0;
        if (sp.isWandering) { sp.isWandering = false; sp.wanderTimer = 4000 + Math.random() * 6000; }
      } else {
        sp.x += (dx / dist) * speed * (dt / 16);
        sp.y += (dy / dist) * speed * (dt / 16);
        sp.dir = Math.abs(dx) > Math.abs(dy) ? (dx > 0 ? DIR_RIGHT : DIR_LEFT) : (dy > 0 ? DIR_DOWN : DIR_UP);
        if (sp.frameTimer > 120) { sp.frame = (sp.frame + 1) % 6; sp.frameTimer = 0; }
      }
    } else {
      if (sp.frameTimer > 500) { sp.frame = (sp.frame + 1) % 2; sp.frameTimer = 0; }
      sp.idleTimer -= dt;
      if (sp.idleTimer <= 0) {
        sp.dir = [DIR_DOWN, DIR_LEFT, DIR_RIGHT, DIR_UP][Math.floor(Math.random() * 4)];
        sp.idleTimer = 2000 + Math.random() * 4000;
      }
      sp.wanderTimer -= dt;
      if (sp.wanderTimer <= 0 && !sp.isWandering) {
        sp.isWandering = true;
        sp.targetX = Math.max(TILE, Math.min(CW - TILE, sp.homeX + (Math.random() - 0.5) * TILE * 2));
        sp.targetY = Math.max(TILE, Math.min(CH - TILE, sp.homeY + (Math.random() - 0.5) * TILE * 1.5));
        sp.state = 'walk'; sp.wanderTimer = 2000 + Math.random() * 2000;
      }
      if (sp.isWandering && sp.state === 'idle') {
        sp.wanderTimer -= dt;
        if (sp.wanderTimer <= 0) { sp.targetX = sp.homeX; sp.targetY = sp.homeY; sp.state = 'walk'; }
      }
    }
  }
  renderAll();
  requestAnimationFrame(gameLoop);
}

// ─────────────────────────────────────────────
//  INTERACTIONS
// ─────────────────────────────────────────────
function canvasXY(e) {
  var r = canvas.getBoundingClientRect();
  return { x: (e.clientX - r.left) * CW / r.width, y: (e.clientY - r.top) * CH / r.height };
}
function hitTest(wx, wy) {
  for (var i = sprites.length - 1; i >= 0; i--) {
    var sp = sprites[i];
    if (Math.abs(wx - sp.x) < 16 && Math.abs(wy - sp.y) < 20) return sp;
  }
  return null;
}

canvas.addEventListener('click', function(e) {
  var w = canvasXY(e), hit = hitTest(w.x, w.y);
  if (hit && selectedSprite === hit) { selectedSprite = null; updateSelPanel(null); }
  else if (hit) { selectedSprite = hit; hit.bubbleVisible = true; hit.bubbleAlpha = 1; hit.bubbleText = getBubbleText(hit.activity); hit.bubbleTimer = 4000; updateSelPanel(hit); }
  else { selectedSprite = null; updateSelPanel(null); }
});

canvas.addEventListener('mousemove', function(e) {
  var w = canvasXY(e), hit = hitTest(w.x, w.y);
  hoveredSprite = hit;
  if (hit) {
    var ttName = document.createElement('div');
    ttName.style.fontWeight = '700'; ttName.style.fontSize = '12px';
    ttName.textContent = hit.name;
    var ttAct = document.createElement('div');
    ttAct.style.marginTop = '3px'; ttAct.style.color = ACTIVITY_COLORS[hit.activity] || '';
    ttAct.textContent = ACTIVITY_LABELS[hit.activity] || hit.activity;
    tooltipEl.textContent = '';
    tooltipEl.appendChild(ttName);
    tooltipEl.appendChild(ttAct);
    tooltipEl.style.left = (e.clientX + 14) + 'px';
    tooltipEl.style.top = (e.clientY - 10) + 'px';
    tooltipEl.classList.add('visible');
    canvas.style.cursor = 'pointer';
  } else {
    tooltipEl.classList.remove('visible');
    canvas.style.cursor = 'default';
  }
});
canvas.addEventListener('mouseleave', function() {
  hoveredSprite = null; tooltipEl.classList.remove('visible'); canvas.style.cursor = 'default';
});

function updateSelPanel(sp) {
  var panel = document.getElementById('selected-panel');
  var info = document.getElementById('selected-info');
  if (!sp) { panel.style.display = 'none'; return; }
  panel.style.display = '';
  panel.style.animation = 'none'; panel.offsetHeight; panel.style.animation = 'fadeInUp 0.3s ease-out';

  var unitStr = sp.unit ? (Array.isArray(sp.unit) ? sp.unit.join(', ') : sp.unit) : '';
  var actColor = ACTIVITY_COLORS[sp.activity] || 'var(--text)';

  info.textContent = '';
  var nameEl = document.createElement('div');
  nameEl.style.cssText = 'font-size:13px;font-weight:700';
  nameEl.textContent = sp.name;
  info.appendChild(nameEl);

  if (unitStr) {
    var unitEl = document.createElement('div');
    unitEl.style.cssText = 'font-size:10px;color:var(--text-muted)';
    unitEl.textContent = unitStr;
    info.appendChild(unitEl);
  }

  var actWrap = document.createElement('div');
  actWrap.style.marginTop = '3px';
  var actBadge = document.createElement('span');
  actBadge.style.cssText = 'display:inline-block;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:600;color:white;background:' + actColor;
  actBadge.textContent = ACTIVITY_LABELS[sp.activity] || sp.activity;
  actWrap.appendChild(actBadge);
  info.appendChild(actWrap);

  var floorEl = document.createElement('div');
  floorEl.style.cssText = 'font-size:10px;color:var(--text-muted);margin-top:3px';
  floorEl.textContent = FLOOR_NAMES[sp.floor];
  info.appendChild(floorEl);

  if (sp.companions && sp.companions.length > 0) {
    var cn = sp.companions.map(function(cid) { return SURGEONS[cid] ? SURGEONS[cid].split(' ').pop() : cid; });
    var compEl = document.createElement('div');
    compEl.style.cssText = 'font-size:10px;color:var(--text-light);margin-top:2px';
    compEl.textContent = 'Con: ' + cn.join(', ');
    info.appendChild(compEl);
  }
}

// ─────────────────────────────────────────────
//  SELECT DAY
// ─────────────────────────────────────────────
var currentMonth, currentYear, selectedDay;
function selectDay(day) {
  if (!day) return;
  selectedDay = day; selectedSprite = null; updateSelPanel(null);
  var activities = getDayActivities(day, currentMonth, currentYear);
  // Filter by turno
  if (currentTurno === 'm') {
    activities = activities.filter(function(a) {
      return MORNING_ACTS.indexOf(a.activity) >= 0 || FULLDAY_ACTS.indexOf(a.activity) >= 0;
    });
  } else if (currentTurno === 't') {
    activities = activities.filter(function(a) {
      return AFTERNOON_ACTS.indexOf(a.activity) >= 0 || FULLDAY_ACTS.indexOf(a.activity) >= 0;
    });
  }
  sprites = assignSprites(activities);
  tileCache = null;

  var fc = [0, 0, 0];
  for (var i = 0; i < activities.length; i++) { var f = FLOOR_MAP[activities[i].activity]; if (f !== undefined) fc[f]++; }

  var dow = new Date(currentYear, currentMonth, day).getDay();
  var dowIdx = dow === 0 ? 6 : dow - 1;
  document.getElementById('day-title').textContent = DAY_NAMES_FULL[dowIdx] + ' ' + day + ' ' + MONTH_NAMES[currentMonth];
  document.getElementById('day-count').textContent = activities.length;

  var fcEl = document.getElementById('floor-counts'); fcEl.textContent = '';
  for (var fi = 2; fi >= 0; fi--) {
    var row = document.createElement('div'); row.className = 'floor-count-row';
    var dot = document.createElement('div'); dot.className = 'floor-dot'; dot.style.background = FLOOR_COLORS[fi];
    row.appendChild(dot); row.appendChild(document.createTextNode(FLOOR_NAMES[fi] + ': ' + fc[fi]));
    fcEl.appendChild(row);
  }
  var prev = document.querySelectorAll('.mini-cal-day.selected');
  for (var i = 0; i < prev.length; i++) prev[i].classList.remove('selected');
  var dayEl = document.querySelector('.mini-cal-day[data-day="' + day + '"]');
  if (dayEl) dayEl.classList.add('selected');
}

// ─────────────────────────────────────────────
//  MINI CALENDAR
// ─────────────────────────────────────────────
function renderMiniCal() {
  var grid = document.getElementById('mini-cal'); grid.textContent = '';
  document.getElementById('cal-month-label').textContent = MONTH_NAMES[currentMonth] + ' ' + currentYear;
  for (var di = 0; di < DAY_NAMES_SHORT.length; di++) {
    var hdr = document.createElement('div'); hdr.className = 'mini-cal-hdr'; hdr.textContent = DAY_NAMES_SHORT[di];
    grid.appendChild(hdr);
  }
  var first = new Date(currentYear, currentMonth, 1);
  var startDay = first.getDay() === 0 ? 6 : first.getDay() - 1;
  var dim = new Date(currentYear, currentMonth + 1, 0).getDate();
  var today = new Date();
  for (var b = 0; b < startDay; b++) grid.appendChild(document.createElement('div'));
  for (var d = 1; d <= dim; d++) {
    var cell = document.createElement('div'); cell.className = 'mini-cal-day'; cell.textContent = d;
    cell.setAttribute('data-day', d);
    if ((startDay + d - 1) % 7 >= 5) cell.classList.add('weekend');
    if (d === today.getDate() && currentMonth === today.getMonth() && currentYear === today.getFullYear()) cell.classList.add('today');
    cell.classList.add(getDayActivities(d, currentMonth, currentYear).length > 0 ? 'has-data' : 'no-data');
    cell.addEventListener('click', (function(dd) { return function() { selectDay(dd); }; })(d));
    grid.appendChild(cell);
  }
}
function navigateMonth(delta) {
  currentMonth += delta;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  selectedDay = null; sprites = []; renderMiniCal();
}

// ─────────────────────────────────────────────
//  LEGEND
// ─────────────────────────────────────────────
function renderLegend() {
  var el = document.getElementById('legend');
  var keys = Object.keys(ACTIVITY_LABELS);
  for (var i = 0; i < keys.length; i++) {
    var item = document.createElement('div'); item.className = 'legend-item';
    var dot = document.createElement('div'); dot.className = 'legend-dot'; dot.style.background = ACTIVITY_COLORS[keys[i]];
    item.appendChild(dot); item.appendChild(document.createTextNode(ACTIVITY_LABELS[keys[i]]));
    el.appendChild(item);
  }
}

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
initTheme();

// ─────────────────────────────────────────────
//  SPLASH SCREEN
// ─────────────────────────────────────────────
function showSplash() {
  var splash = document.getElementById('splash');
  splash.style.display = '';
  document.getElementById('btn-enter').addEventListener('click', function() {
    splash.classList.add('fade-out');
    setTimeout(function() {
      splash.style.display = 'none';
      document.getElementById('main-content').style.display = '';
      initHospital();
    }, 800);
  });
}

function initHospital() {
  var now = new Date();
  var allE = [];
  for (var sid in parsedData) for (var i = 0; i < parsedData[sid].length; i++) allE.push(parsedData[sid][i]);
  var dm = {};
  for (var i = 0; i < allE.length; i++) dm[allE[i].year + '-' + allE[i].month] = true;
  if (dm[now.getFullYear() + '-' + now.getMonth()]) { currentMonth = now.getMonth(); currentYear = now.getFullYear(); }
  else { var last = allE[allE.length - 1]; currentMonth = last.month; currentYear = last.year; }

  renderMiniCal(); renderAll();
  if (dm[now.getFullYear() + '-' + now.getMonth()]) selectDay(now.getDate());

  document.getElementById('cal-prev').addEventListener('click', function() { navigateMonth(-1); });
  document.getElementById('cal-next').addEventListener('click', function() { navigateMonth(1); });

  // Turno toggle
  document.querySelectorAll('.turno-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.turno-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      currentTurno = btn.getAttribute('data-turno');
      if (selectedDay) selectDay(selectedDay);
    });
  });
  requestAnimationFrame(gameLoop);
}

if (loadData()) {
  showSplash();
} else {
  document.getElementById('no-data').style.display = '';
}

// ─────────────────────────────────────────────
//  MOBILE ZOOM
// ─────────────────────────────────────────────
(function() {
  var wrap = document.getElementById('canvas-wrap');
  var cv = document.getElementById('game-canvas');
  var zoomLabel = document.getElementById('zoom-label');
  var zoomLevel = 1;
  var isMobile = window.matchMedia('(max-width: 700px)').matches;

  function applyZoom(level) {
    zoomLevel = Math.max(1, Math.min(3, level));
    cv.style.width = (zoomLevel * 100) + '%';
    zoomLabel.textContent = Math.round(zoomLevel * 100) + '%';
    if (zoomLevel > 1) {
      wrap.classList.add('zoomable');
    } else {
      wrap.classList.remove('zoomable');
      wrap.scrollLeft = 0; wrap.scrollTop = 0;
    }
  }

  document.getElementById('zoom-in').addEventListener('click', function() { applyZoom(zoomLevel + 0.5); });
  document.getElementById('zoom-out').addEventListener('click', function() { applyZoom(zoomLevel - 0.5); });
  document.getElementById('zoom-reset').addEventListener('click', function() { applyZoom(1); });

  // Pinch-to-zoom on touch
  var lastDist = 0;
  wrap.addEventListener('touchstart', function(e) {
    if (e.touches.length === 2) {
      var dx = e.touches[0].clientX - e.touches[1].clientX;
      var dy = e.touches[0].clientY - e.touches[1].clientY;
      lastDist = Math.sqrt(dx*dx + dy*dy);
    }
  }, { passive: true });
  wrap.addEventListener('touchmove', function(e) {
    if (e.touches.length === 2) {
      var dx = e.touches[0].clientX - e.touches[1].clientX;
      var dy = e.touches[0].clientY - e.touches[1].clientY;
      var dist = Math.sqrt(dx*dx + dy*dy);
      if (lastDist > 0) {
        var scale = dist / lastDist;
        applyZoom(zoomLevel * scale);
      }
      lastDist = dist;
    }
  }, { passive: true });
  wrap.addEventListener('touchend', function() { lastDist = 0; }, { passive: true });

  window.matchMedia('(max-width: 700px)').addEventListener('change', function(e) {
    isMobile = e.matches;
    if (!isMobile) applyZoom(1);
  });
})();

if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
  var el = document.querySelectorAll('a[href^="https://jmacot.github.io"]');
  for (var i = 0; i < el.length; i++) { el[i].removeAttribute('href'); el[i].style.opacity = '0.4'; el[i].style.pointerEvents = 'none'; }
}
