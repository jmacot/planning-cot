<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Preview — Quirofano diseñado</title>
<style>
  body { background: #1a1a2e; display: flex; flex-direction: column; align-items: center; padding: 30px; font-family: Inter, sans-serif; color: white; }
  canvas { image-rendering: pixelated; image-rendering: crisp-edges; border: 2px solid #444; }
  h2 { margin-bottom: 12px; }
  p { color: #888; font-size: 12px; margin-bottom: 16px; }
</style>
</head>
<body>
<h2>Quirofano 1 — Tu diseño</h2>
<p>Mapa 23x20 tiles, 16px/tile. Renderizado a 2x (736x640)</p>
<canvas id="c"></canvas>

<script>
var SCALE = 2;
var TILE = 16;

fetch('assets/zones/qx4/map.json')
  .then(function(r) { return r.json(); })
  .then(function(mapData) {
    var mw = mapData.mapWidth;   // 23
    var mh = mapData.mapHeight;  // 20
    var ts = mapData.tileSize;   // 16

    var canvas = document.getElementById('c');
    canvas.width = mw * ts * SCALE;
    canvas.height = mh * ts * SCALE;
    var ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;

    var spritesheet = new Image();
    spritesheet.onload = function() {
      var sheetCols = Math.floor(spritesheet.naturalWidth / ts);

      // Floor — light blue-gray clinical tiles
      ctx.fillStyle = '#c8d8e4';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Walls — darker band at top and sides
      ctx.fillStyle = '#5a5a6e';
      ctx.fillRect(0, 0, canvas.width, 2 * ts * SCALE); // top wall 2 tiles
      ctx.fillRect(0, 0, 4 * ts * SCALE, canvas.height); // left wall 4 tiles
      // Wall bottom edge accent
      ctx.fillStyle = '#7a7a8a';
      ctx.fillRect(4 * ts * SCALE, 2 * ts * SCALE - 2, canvas.width - 4 * ts * SCALE, 3);

      // Floor tile grid (subtle)
      ctx.strokeStyle = 'rgba(0,0,0,0.06)';
      ctx.lineWidth = 1;
      for (var gx = 0; gx < canvas.width; gx += ts * SCALE) {
        ctx.beginPath(); ctx.moveTo(gx, 2*ts*SCALE); ctx.lineTo(gx, canvas.height); ctx.stroke();
      }
      for (var gy = 2*ts*SCALE; gy < canvas.height; gy += ts * SCALE) {
        ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(canvas.width, gy); ctx.stroke();
      }

      // Render all layers (bottom-up: last layer first since Layer_0 is base)
      var layers = mapData.layers.slice().reverse();
      for (var li = 0; li < layers.length; li++) {
        var layer = layers[li];
        for (var i = 0; i < layer.tiles.length; i++) {
          var tile = layer.tiles[i];
          var id = parseInt(tile.id);
          var dx = tile.x * ts * SCALE;
          var dy = tile.y * ts * SCALE;
          var sx = (id % sheetCols) * ts;
          var sy = Math.floor(id / sheetCols) * ts;
          ctx.drawImage(spritesheet, sx, sy, ts, ts, dx, dy, ts * SCALE, ts * SCALE);
        }
      }
    };
    spritesheet.src = 'assets/zones/qx4/spritesheet.png';
  });
</script>
</body>
</html>
